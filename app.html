<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PitchSide Pro v9.1 eFootball Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #0a0e14; /* eFootball Dark */
            --accent: #00d4ff; /* Electric Blue */
            --secondary: #ff007a; /* Neon Pink */
            --bg: #05070a;
            --card-bg: #151b26;
            --text-main: #ffffff;
            --text-sub: #8e9aaf;
            --green: #00ffa3;
            --yellow: #ffd700;
            --glass: rgba(255, 255, 255, 0.05);
            --gradient: linear-gradient(135deg, #00d4ff 0%, #ff007a 100%);
        }
        *, *::before, *::after { box-sizing: border-box; }
        html, body { overflow-x: hidden; width: 100%; position: relative; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); margin: 0; padding-bottom: 100px; color: var(--text-main); user-select: none; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        
        /* eFootball Layout */
        .container { max-width: 500px; margin: 0 auto; min-height: 100vh; padding: 0 15px; transition: transform 0.2s cubic-bezier(0,0,0.2,1); }
        .tab-content { display: none; padding: 15px 0; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Loading Spinner */
        #ptr-indicator { position: absolute; top: -60px; left: 0; width: 100%; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; color: var(--accent); pointer-events: none; z-index: 3000; }
        .spinner { width: 20px; height: 20px; border: 2px solid var(--glass); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; display: none; margin-right: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* eFootball Cards */
        .card { background: var(--card-bg); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--glass); box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--gradient); }
        
        .report-item { margin-bottom: 12px; background: var(--card-bg); border-radius: 16px; border: 1px solid var(--glass); overflow: hidden; }
        .report-item summary { padding: 18px; cursor: pointer; list-style: none; outline: none; display: flex; flex-direction: column; }
        .report-score { font-size: 28px; font-weight: 900; color: var(--accent); margin: 8px 0; letter-spacing: 2px; }
        
        /* Live Header */
        .live-header { background: linear-gradient(180deg, #151b26 0%, #0a0e14 100%); color: #fff; padding: 20px; border-radius: 24px; margin-bottom: 20px; text-align: center; border: 1px solid var(--glass); }
        .timer-display { font-size: 48px; font-weight: 900; font-variant-numeric: tabular-nums; letter-spacing: 4px; color: var(--accent); text-shadow: 0 0 20px rgba(0,212,255,0.3); }
        .score-board { display: flex; justify-content: space-around; align-items: center; margin-top: 15px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 16px; border: 1px solid var(--glass); }
        .score-ctrl { display: inline-flex; align-items: center; gap: 12px; }
        .score-btn { width: 34px; height: 34px; border-radius: 10px; border: none; background: var(--glass); color: #fff; font-weight: 900; cursor: pointer; transition: 0.2s; }
        .score-btn:active { transform: scale(0.9); background: var(--accent); }
        .score-val { font-size: 32px; font-weight: 900; min-width: 45px; }

        /* Pitch & Players */
        .pitch { width: 100%; aspect-ratio: 3/4; background: linear-gradient(180deg, #0f1a10 0%, #070d08 100%); position: relative; border-radius: 24px; overflow: hidden; margin-top: 15px; border: 2px solid #1a2a1b; box-shadow: inset 0 0 50px rgba(0,0,0,0.8); }
        .pitch::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px); background-size: 10% 10%; pointer-events: none; }
        
        .player-icon { position: absolute; width: 60px; text-align: center; transform: translate(-50%, -50%); z-index: 10; cursor: pointer; touch-action: none; transition: transform 0.1s; }
        .player-icon.dragging { opacity: 0.6; transform: translate(-50%, -50%) scale(1.1); z-index: 100; }
        
        /* eFootball Jersey/Avatar Icon */
        .icon-jersey { 
            width: 44px; height: 44px; background: var(--card-bg); border: 2px solid var(--accent); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            margin: 0 auto; font-size: 18px; font-weight: 900; position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6); overflow: hidden;
        }
        .player-photo { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; }
        .jersey-num-overlay { position: relative; z-index: 2; text-shadow: 0 0 5px rgba(0,0,0,0.8); color: #fff; }

        .icon-name { display: flex; align-items: center; justify-content: center; gap: 4px; font-size: 10px; font-weight: 800; color: #fff; background: rgba(0,0,0,0.7); padding: 3px 8px; border-radius: 10px; margin-top: 6px; white-space: nowrap; border: 1px solid var(--glass); }
        .goal-mini { background: var(--accent); color: #000; border-radius: 50%; width: 12px; height: 12px; font-size: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; }
        
        /* Card Status */
        .card-mini { position: absolute; top: 0; right: 0; width: 12px; height: 16px; border-radius: 2px; border: 1px solid #fff; z-index: 5; }
        .card-yellow { background: var(--yellow); box-shadow: 0 0 10px var(--yellow); }
        .card-red { background: var(--secondary); box-shadow: 0 0 10px var(--secondary); }
        .card-green { background: var(--green); box-shadow: 0 0 10px var(--green); }

        /* Grid UI */
        .player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 10px; margin-top: 15px; }
        .player-chip { background: var(--card-bg); border: 1px solid var(--glass); border-radius: 16px; padding: 12px 5px; text-align: center; font-size: 11px; font-weight: 800; cursor: pointer; position: relative; touch-action: none; transition: 0.2s; }
        .player-chip.on-pitch { border-color: var(--accent); box-shadow: 0 0 10px rgba(0,212,255,0.2); }
        .player-chip.bench { color: var(--text-sub); border-style: dashed; }
        .player-chip.dragging { opacity: 0.5; transform: scale(1.05); }
        .chip-num { position: absolute; top: -6px; left: -6px; background: var(--gradient); color: #fff; font-size: 9px; padding: 2px 6px; border-radius: 6px; font-weight: 900; }
        
        /* Form UI */
        input, select, textarea { width: 100%; padding: 15px; border: 1px solid var(--glass); border-radius: 16px; font-size: 16px; margin-bottom: 12px; font-weight: bold; outline: none; background: rgba(0,0,0,0.3); color: #fff; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0,212,255,0.2); }
        button { background: var(--gradient); color: #fff; border: none; padding: 18px; border-radius: 18px; font-weight: 900; width: 100%; cursor: pointer; transition: 0.3s; letter-spacing: 1px; }
        button:active { transform: scale(0.96); filter: brightness(1.2); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .quick-chip { background: var(--glass); border: 1px solid var(--glass); padding: 10px 15px; border-radius: 12px; font-size: 12px; font-weight: 800; margin: 0 8px 10px 0; display: inline-block; cursor: pointer; color: var(--text-sub); }
        .quick-chip:active { color: var(--accent); border-color: var(--accent); }
        
        .chip-del { background: var(--glass); border: 1px solid var(--glass); padding: 12px 18px; border-radius: 16px; font-size: 13px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .del-btn { color: var(--secondary); font-weight: 900; padding: 5px 10px; cursor: pointer; }
        .edit-btn { color: var(--accent); font-weight: 900; padding: 5px 10px; cursor: pointer; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 25px; left: 15px; right: 15px; background: rgba(21, 27, 38, 0.85); backdrop-filter: blur(20px); border-radius: 25px; display: flex; padding: 15px 10px; border: 1px solid var(--glass); box-shadow: 0 15px 40px rgba(0,0,0,0.6); z-index: 1000; }
        .nav-item { flex: 1; text-align: center; font-size: 11px; color: var(--text-sub); font-weight: 900; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--accent); transform: translateY(-3px); }
        
        /* Modal eFootball style */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card-bg); width: 100%; max-width: 400px; border-radius: 30px; padding: 30px; border: 1px solid var(--glass); animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .action-btn { background: var(--glass); border: 1px solid var(--glass); padding: 18px; border-radius: 18px; font-weight: 900; margin-bottom: 10px; text-align: center; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; transition: 0.2s; }
        .action-btn:active { background: var(--accent); color: #000; }

        /* Photo Upload */
        .photo-input-wrap { width: 60px; height: 60px; background: var(--glass); border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; border: 1px dashed var(--accent); }
        .photo-input-wrap input { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
        .photo-preview { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: none; }
    </style>
</head>
<body>

<div id="ptr-indicator"><div class="spinner" id="ptr-spinner"></div><span id="ptr-text">PULL TO REFRESH</span></div>

<div class="container" id="appContainer">
    <div id="loginSection" style="padding:120px 30px; text-align:center;">
        <div style="width:80px; height:80px; background:var(--gradient); border-radius:20px; margin:0 auto 20px; display:flex; align-items:center; justify-content:center; box-shadow:0 0 30px rgba(0,212,255,0.4);">
            <div style="font-size:40px; font-weight:900;">P</div>
        </div>
        <h1 style="color:#fff; font-size:2.2rem; font-weight:900; letter-spacing:2px; margin-bottom:5px;">PITCHSIDE</h1>
        <p style="color:var(--accent); font-size:12px; font-weight:900; margin-bottom:40px;">PRO v9.1 eFootball Edition</p>
        <input type="password" id="passcode" placeholder="ENTER PASSCODE" style="text-align:center; letter-spacing:4px;">
        <button id="loginBtn" style="margin-top:15px; font-size:16px;">LOGIN</button>
    </div>

    <div id="mainUI" style="display:none;">
        <div id="tabLive" class="tab-content active">
            <div id="setupScreen">
                <div class="card">
                    <h2 style="font-size:18px; font-weight:900; margin:0 0 20px 0; color:var(--accent);">MATCH SETUP</h2>
                    <label style="font-size:11px; font-weight:900; color:var(--text-sub);">OPPONENT</label>
                    <div id="quickOppList" style="margin-top:10px;"></div>
                    <input type="text" id="oppName" placeholder="OPPONENT TEAM">
                    
                    <label style="font-size:11px; font-weight:900; color:var(--text-sub); margin-top:15px; display:block;">VENUE</label>
                    <div id="quickVenueList" style="margin-top:10px;"></div>
                    <input type="text" id="venueName" placeholder="STADIUM / FIELD">
                    
                    <label style="font-size:11px; font-weight:900; color:var(--text-sub); margin-top:15px; display:block;">MATCH TYPE</label>
                    <select id="matchType">
                        <option value="公式戦">OFFICIAL MATCH</option>
                        <option value="トレーニングマッチ">TRAINING MATCH</option>
                        <option value="カップ戦">CUP MATCH</option>
                        <option value="その他">OTHERS</option>
                    </select>

                    <div style="display:flex; gap:15px; margin-top:15px;">
                        <div style="flex:1;"><label style="font-size:11px; font-weight:900; color:var(--text-sub);">TIME</label>
                            <select id="halfMinutes">
                                <option value="5">5m</option><option value="10">10m</option><option value="15" selected>15m</option>
                                <option value="20">20m</option><option value="25">25m</option><option value="30">30m</option>
                                <option value="35">35m</option><option value="40">40m</option><option value="45">45m</option>
                            </select>
                        </div>
                        <div style="flex:2;"><label style="font-size:11px; font-weight:900; color:var(--text-sub);">FORMATION</label>
                            <select id="formationSelect">
                                <option value="3-3-1">3-3-1 BASIC</option>
                                <option value="2-4-1">2-4-1 ATTACK</option>
                                <option value="3-2-2">3-2-2 COUNTER</option>
                                <option value="2-3-2">2-3-2 ULTRA</option>
                            </select>
                        </div>
                    </div>
                    <button id="kickoffBtn" onclick="startMatch()" style="margin-top:25px; height:65px; font-size:18px;">KICK OFF</button>
                </div>
            </div>

            <div id="liveScreen" style="display:none;">
                <div class="live-header">
                    <div id="syncStatus" style="font-size:10px; font-weight:900; color:var(--green); margin-bottom:10px; letter-spacing:1px;">● LIVE SYNCED</div>
                    <div class="timer-display" id="timerText">15:00</div>
                    <div style="display:flex; justify-content:center; gap:15px; margin:20px 0;">
                        <button id="btnTimer" onclick="toggleTimer()" style="background:#fff; color:#000; height:55px;">START</button>
                        <button onclick="endPeriod()" style="background:var(--glass); border:none; border-radius:18px; color:#fff; height:55px; font-weight:900;">FINISH</button>
                    </div>
                    <div class="score-board">
                        <div style="text-align:center;">
                            <div style="font-size:11px; font-weight:900; color:var(--text-sub); margin-bottom:5px;" id="myTeamDisplay">HOME</div>
                            <div class="score-ctrl">
                                <button class="score-btn" onclick="modifyOwnScore(-1)">-</button>
                                <div id="scoreOwn" class="score-val">0</div>
                                <button class="score-btn" onclick="modifyOwnScore(1)">+</button>
                            </div>
                        </div>
                        <div style="font-size:20px; font-weight:900; color:var(--glass);">VS</div>
                        <div style="text-align:center;">
                            <div style="font-size:11px; font-weight:900; color:var(--text-sub); margin-bottom:5px;" id="oppDisplay">AWAY</div>
                            <div class="score-ctrl">
                                <button class="score-btn" onclick="modifyOppScore(-1)">-</button>
                                <div id="scoreOpp" class="score-val">0</div>
                                <button class="score-btn" onclick="modifyOppScore(1)">+</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="pitch" id="livePitchArea"></div>
                <div class="section-title" style="font-size:12px; font-weight:900; color:var(--accent); margin-top:25px; letter-spacing:1px;">SUBSTITUTIONS</div>
                <div id="onPitchGrid" class="player-grid"></div>
                <div id="benchGrid" class="player-grid"></div>
                <textarea id="liveMemo" placeholder="MATCH NOTES..." oninput="syncToCloud()" style="height:120px; margin-top:20px; background:var(--card-bg);"></textarea>
                <div id="eventLog" style="font-size:12px; color:var(--text-sub); margin-top:15px; font-weight:600;"></div>
            </div>
        </div>

        <div id="tabHistory" class="tab-content">
            <h2 style="font-size:18px; font-weight:900; margin-bottom:20px; color:var(--accent);">MATCH HISTORY</h2>
            <div id="historyList"></div>
        </div>

        <div id="tabSettings" class="tab-content">
            <div class="card">
                <h2 style="font-size:18px; font-weight:900; margin:0 0 20px 0; color:var(--accent);">SETTINGS</h2>
                <label style="font-size:11px; font-weight:900; color:var(--text-sub);">MY TEAM NAME</label>
                <input type="text" id="myTeamInput" onchange="saveTeamName()">
                
                <label style="font-size:11px; font-weight:900; color:var(--text-sub); margin-top:20px; display:block;">PLAYER REGISTRATION</label>
                <div style="display:flex; gap:10px; align-items:center;">
                    <div class="photo-input-wrap">
                        <span id="photoIcon">📷</span>
                        <img id="pInPhotoPreview" class="photo-preview">
                        <input type="file" id="pInPhoto" accept="image/*" onchange="previewPhoto(this)">
                    </div>
                    <input type="number" id="pInNum" placeholder="No." style="width:65px; margin-bottom:0;">
                    <input type="text" id="pInName" placeholder="PLAYER NAME" style="margin-bottom:0;">
                    <button onclick="addMaster('players')" style="width:60px; height:50px; padding:0;">ADD</button>
                </div>
                <div id="pMasterList" style="margin-top:20px;"></div>

                <label style="font-size:11px; font-weight:900; color:var(--text-sub); margin-top:30px; display:block;">OPPONENT LIST</label>
                <div style="display:flex; gap:10px;"><input type="text" id="oppInName" placeholder="TEAM NAME" style="margin-bottom:0;"><button onclick="addMaster('opps')" style="width:60px; height:50px; padding:0;">ADD</button></div>
                <div id="oppMasterList" style="margin-top:15px;"></div>

                <label style="font-size:11px; font-weight:900; color:var(--text-sub); margin-top:30px; display:block;">VENUE LIST</label>
                <div style="display:flex; gap:10px;"><input type="text" id="venueInName" placeholder="VENUE NAME" style="margin-bottom:0;"><button onclick="addMaster('venues')" style="width:60px; height:50px; padding:0;">ADD</button></div>
                <div id="venueMasterList" style="margin-top:15px;"></div>
            </div>
        </div>
    </div>

    <div class="bottom-nav" id="bottomNav" style="display:none;">
        <div class="nav-item active" id="navLive" onclick="showTab('tabLive', this)">LIVE</div>
        <div class="nav-item" id="navHistory" onclick="showTab('tabHistory', this)">HISTORY</div>
        <div class="nav-item" id="navSettings" onclick="showTab('tabSettings', this)">SETTINGS</div>
    </div>
</div>

<div id="actionModal" class="modal-overlay" onclick="closeModals()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 id="modalTitle" style="text-align:center; color:var(--accent); margin-bottom:20px; font-weight:900;"></h3>
        <div id="modalList"></div>
        <button onclick="closeModals()" style="background:var(--glass); color:#fff; margin-top:15px;">CLOSE</button>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://gdzdyykladyccrcvdtbh.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_TWz1alSKy36qDAGtmZ3DFg_7N7sdmBz';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let db = {
        myTeam: localStorage.getItem('ps_myteam') || "MY TEAM",
        players: JSON.parse(localStorage.getItem('ps_players_v9')) || [],
        opps: JSON.parse(localStorage.getItem('ps_opps_master')) || [],
        venues: JSON.parse(localStorage.getItem('ps_venues_master')) || []
    };

    let live = { currentId: null, timerInterval: null, timerLeft: 0, score: { own: 0, opp: 0 }, events: [], memo: "", formation: "3-3-1", pitchPositions: {}, playerGoals: {}, playerCards: {} };

    const formations = {
        "3-3-1": [ {id:'gk',t:'90%',l:'50%',label:'GK'}, {id:'df1',t:'75%',l:'20%',label:'DFL'}, {id:'df2',t:'75%',l:'50%',label:'DFC'}, {id:'df3',t:'75%',l:'80%',label:'DFR'}, {id:'mf1',t:'45%',l:'20%',label:'MFL'}, {id:'mf2',t:'45%',l:'50%',label:'MFC'}, {id:'mf3',t:'45%',l:'80%',label:'MFR'}, {id:'fw1',t:'15%',l:'50%',label:'FW'} ],
        "2-4-1": [ {id:'gk',t:'90%',l:'50%',label:'GK'}, {id:'df1',t:'75%',l:'30%',label:'DFL'}, {id:'df2',t:'75%',l:'70%',label:'DFR'}, {id:'mf1',t:'45%',l:'15%',label:'ML'}, {id:'mf2',t:'45%',l:'38%',label:'MCL'}, {id:'mf3',t:'45%',l:'62%',label:'MCR'}, {id:'mf4',t:'45%',l:'85%',label:'MR'}, {id:'fw1',t:'15%',l:'50%',label:'FW'} ],
        "3-2-2": [ {id:'gk',t:'90%',l:'50%',label:'GK'}, {id:'df1',t:'75%',l:'20%',label:'DFL'}, {id:'df2',t:'75%',l:'50%',label:'DFC'}, {id:'df3',t:'75%',l:'80%',label:'DFR'}, {id:'mf1',t:'45%',l:'35%',label:'MCL'}, {id:'mf2',t:'45%',l:'65%',label:'MCR'}, {id:'fw1',t:'20%',l:'30%',label:'FWL'}, {id:'fw2',t:'20%',l:'70%',label:'FWR'} ],
        "2-3-2": [ {id:'gk',t:'90%',l:'50%',label:'GK'}, {id:'df1',t:'75%',l:'30%',label:'DFL'}, {id:'df2',t:'75%',l:'70%',label:'DFR'}, {id:'mf1',t:'45%',l:'20%',label:'MFL'}, {id:'mf2',t:'45%',l:'50%',label:'MFC'}, {id:'mf3',t:'45%',l:'80%',label:'MFR'}, {id:'fw1',t:'20%',l:'30%',label:'FWL'}, {id:'fw2',t:'20%',l:'70%',label:'FWR'} ]
    };

    // Login Logic Fix
    document.addEventListener('DOMContentLoaded', () => {
        const loginBtn = document.getElementById('loginBtn');
        if (loginBtn) {
            loginBtn.addEventListener('click', checkPass);
        }
        
        // Enter key support for login
        const passcodeField = document.getElementById('passcode');
        if (passcodeField) {
            passcodeField.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') checkPass();
            });
        }

        // Auto login check
        if (localStorage.getItem('ps_logged_in') === 'true') {
            enterMainUI();
            if (localStorage.getItem('ps_show_reports') === 'true') {
                localStorage.removeItem('ps_show_reports');
                showTab('tabHistory', document.getElementById('navHistory'));
            }
        }
    });

    function checkPass() {
        const val = document.getElementById('passcode').value;
        if(val === "2026kickoff") { 
            localStorage.setItem('ps_logged_in', 'true'); 
            enterMainUI(); 
        } else { 
            alert("ACCESS DENIED"); 
        }
    }

    function enterMainUI() {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('mainUI').style.display = 'block';
        document.getElementById('bottomNav').style.display = 'flex';
        document.getElementById('myTeamInput').value = db.myTeam;
        refreshSettingsUI(); 
        updateQuickLists();
    }

    // Drag and Drop
    let draggedElement = null, draggedPlayerId = null, dragSourcePosId = null;

    function initDraggable(el, pId, posId = null) {
        el.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) return;
            draggedElement = el; draggedPlayerId = pId; dragSourcePosId = posId;
            el.classList.add('dragging');
        }, { passive: true });

        el.addEventListener('touchmove', (e) => {
            if (!draggedElement) return;
            const touch = e.touches[0];
            el.style.position = 'fixed'; el.style.left = touch.clientX + 'px'; el.style.top = touch.clientY + 'px';
            e.preventDefault();
        }, { passive: false });

        el.addEventListener('touchend', (e) => {
            if (!draggedElement) return;
            el.classList.remove('dragging');
            el.style.position = ''; el.style.left = ''; el.style.top = '';
            const touch = e.changedTouches[0];
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            const dropZone = target ? target.closest('.player-icon, .player-chip, .pitch') : null;
            if (dropZone) handleDrop(dropZone);
            else updateUI();
            draggedElement = null; draggedPlayerId = null; dragSourcePosId = null;
        });
    }

    function handleDrop(target) {
        const targetPosId = target.getAttribute('data-pos-id');
        if (targetPosId) {
            if (dragSourcePosId) {
                const temp = live.pitchPositions[targetPosId];
                live.pitchPositions[targetPosId] = draggedPlayerId;
                live.pitchPositions[dragSourcePosId] = temp;
            } else live.pitchPositions[targetPosId] = draggedPlayerId;
        } else if (target.classList.contains('player-chip') || target.closest('#benchGrid')) {
            if (dragSourcePosId) delete live.pitchPositions[dragSourcePosId];
        }
        syncToCloud(); updateUI();
    }

    // Pull to Refresh
    let startY = 0, pulling = false;
    const appContainer = document.getElementById('appContainer'), ptrIndicator = document.getElementById('ptr-indicator'), ptrSpinner = document.getElementById('ptr-spinner'), ptrText = document.getElementById('ptr-text');

    window.addEventListener('touchstart', (e) => {
        if (document.getElementById('liveScreen').style.display === 'block') return;
        if (window.scrollY === 0) { startY = e.touches[0].pageY; pulling = true; }
    }, { passive: true });

    window.addEventListener('touchmove', (e) => {
        if (!pulling) return;
        const currentY = e.touches[0].pageY, diff = currentY - startY;
        if (diff > 0) {
            const move = Math.pow(diff, 0.8);
            appContainer.style.transform = `translateY(${move}px)`;
            ptrText.innerText = move > 50 ? "RELEASE TO REFRESH" : "PULL TO REFRESH";
        }
    }, { passive: true });

    window.addEventListener('touchend', () => {
        if (!pulling) return;
        const transform = appContainer.style.transform, match = transform.match(/translateY\((.*)px\)/), move = match ? parseFloat(match[1]) : 0;
        appContainer.style.transform = ''; pulling = false;
        if (move > 50) { ptrSpinner.style.display = 'block'; ptrText.innerText = "REFRESHING..."; setTimeout(() => location.reload(), 300); }
    });

    // Photo Preview & Storage
    let currentPhotoData = null;
    function previewPhoto(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                currentPhotoData = e.target.result;
                document.getElementById('pInPhotoPreview').src = currentPhotoData;
                document.getElementById('pInPhotoPreview').style.display = 'block';
                document.getElementById('photoIcon').style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function startMatch() {
        const opp = document.getElementById('oppName').value.trim(), venue = document.getElementById('venueName').value.trim(), type = document.getElementById('matchType').value;
        if(!opp || !venue) { alert("COMPLETE ALL FIELDS"); return; }
        const btn = document.getElementById('kickoffBtn'); btn.disabled = true; btn.innerText = "PREPARING...";
        if(!db.opps.includes(opp)) { db.opps.push(opp); localStorage.setItem('ps_opps_master', JSON.stringify(db.opps)); }
        if(!db.venues.includes(venue)) { db.venues.push(venue); localStorage.setItem('ps_venues_master', JSON.stringify(db.venues)); }
        live.formation = document.getElementById('formationSelect').value;
        live.timerLeft = parseInt(document.getElementById('halfMinutes').value, 10) * 60;
        live.score = { own: 0, opp: 0 }; live.playerGoals = {}; live.playerCards = {}; live.events = []; live.memo = "";
        const f = formations[live.formation], sorted = [...db.players].sort((a,b) => (Number(a.num)||999) - (Number(b.num)||999));
        live.pitchPositions = {}; f.forEach((pos, idx) => { if(sorted[idx]) live.pitchPositions[pos.id] = sorted[idx].id; });
        document.getElementById('setupScreen').style.display = 'none'; document.getElementById('liveScreen').style.display = 'block';
        document.getElementById('oppDisplay').innerText = opp; document.getElementById('myTeamDisplay').innerText = db.myTeam;
        updateUI();
        supabaseClient.from('match_reports').insert([{ my_team: db.myTeam, opponent: opp, venue: `${venue} (${type})`, score: "0 - 0", detail: "MATCH START", memo: "" }]).select().then(({ data, error }) => {
            if(!error && data) { live.currentId = data[0].id; document.getElementById('syncStatus').innerText = "● LIVE SYNCED"; }
            btn.disabled = false; btn.innerText = "KICK OFF";
        });
    }

    async function syncToCloud() {
        if(!live.currentId) return;
        const status = document.getElementById('syncStatus'); status.innerText = "● SYNCING..."; status.style.color = "#ffd700";
        live.memo = document.getElementById('liveMemo').value;
        const { error } = await supabaseClient.from('match_reports').update({ score: `${live.score.own} - ${live.score.opp}`, detail: live.events.map(e => `${e.time} ${e.text}`).join('\n'), memo: live.memo }).eq('id', live.currentId);
        if(!error) { status.innerText = "● LIVE SYNCED"; status.style.color = "#00ffa3"; }
    }

    function updateUI() {
        document.getElementById('timerText').innerText = formatTime(live.timerLeft);
        document.getElementById('scoreOwn').innerText = live.score.own; document.getElementById('scoreOpp').innerText = live.score.opp;
        const f = formations[live.formation];
        document.getElementById('livePitchArea').innerHTML = f.map(pos => {
            const pId = live.pitchPositions[pos.id], p = db.players.find(x => x.id === pId);
            if(!p) return `<div class="player-icon" style="top:${pos.t}; left:${pos.l};" data-pos-id="${pos.id}" onclick="openBenchSelector('${pos.id}')"><div class="icon-jersey" style="border-style:dashed; opacity:0.3;">＋</div><div class="icon-name">${pos.label}</div></div>`;
            const g = live.playerGoals[p.id] || 0, card = live.playerCards[p.id];
            return `<div class="player-icon" id="icon-${p.id}" style="top:${pos.t}; left:${pos.l};" data-pos-id="${pos.id}" data-player-id="${p.id}" onclick="openPlayerAction('${p.id}')">
                <div class="icon-jersey">
                    ${p.photo ? `<img src="${p.photo}" class="player-photo">` : ''}
                    <span class="jersey-num-overlay">${p.num || ''}</span>
                </div>
                ${card ? `<div class="card-mini card-${card}"></div>` : ''}
                <div class="icon-name"><span>${p.name}</span>${g>0?`<span class="goal-mini">${g}</span>`:''}</div>
            </div>`;
        }).join('');
        const onIds = Object.values(live.pitchPositions);
        document.getElementById('onPitchGrid').innerHTML = db.players.filter(p => onIds.includes(p.id)).map(p => `<div class="player-chip on-pitch" id="chip-${p.id}" data-player-id="${p.id}" onclick="openPlayerAction('${p.id}')">${p.num?`<span class="chip-num">${p.num}</span>`:''}${p.name}</div>`).join('');
        document.getElementById('benchGrid').innerHTML = db.players.filter(p => !onIds.includes(p.id)).map(p => `<div class="player-chip bench" id="chip-${p.id}" data-player-id="${p.id}" onclick="openPositionSelector('${p.id}')">${p.num?`<span class="chip-num">${p.num}</span>`:''}${p.name}</div>`).join('');
        db.players.forEach(p => {
            const iconEl = document.getElementById(`icon-${p.id}`), chipEl = document.getElementById(`chip-${p.id}`);
            if (iconEl) initDraggable(iconEl, p.id, Object.keys(live.pitchPositions).find(k => live.pitchPositions[k] === p.id));
            if (chipEl) initDraggable(chipEl, p.id);
        });
    }

    function openPlayerAction(pId) {
        const p = db.players.find(x => x.id === pId), posId = Object.keys(live.pitchPositions).find(k => live.pitchPositions[k] === pId);
        const html = `<div class="action-btn" onclick="recordGoal('${pId}')">⚽ GOAL</div><div class="action-btn" onclick="openBenchSelector('${posId}')">🔄 SUBSTITUTE</div><div class="action-btn" onclick="delete live.pitchPositions['${posId}']; updateUI(); syncToCloud(); closeModals();">🔻 TO BENCH</div><div style="display:flex; gap:10px; margin-top:15px;"><div class="action-btn" style="flex:1; background:#ffd700; color:#000;" onclick="giveCard('${pId}', 'yellow')">🟨</div><div class="action-btn" style="flex:1; background:#ff007a; color:#fff;" onclick="giveCard('${pId}', 'red')">🟥</div><div class="action-btn" style="flex:1; background:#00ffa3; color:#fff;" onclick="giveCard('${pId}', 'green')">🟩</div></div>`;
        showActionModal(`${p.num?p.num+' ':''}${p.name}`, html);
    }

    function giveCard(pId, type) { live.playerCards[pId] = type; addEvent(`${db.players.find(x=>x.id===pId).name} ${type.toUpperCase()} CARD`); updateUI(); syncToCloud(); closeModals(); }
    function recordGoal(pId) { live.playerGoals[pId] = (live.playerGoals[pId] || 0) + 1; live.score.own++; addEvent(`${db.players.find(x=>x.id===pId).name} GOAL!`); syncToCloud(); updateUI(); closeModals(); }
    function modifyOwnScore(val) {
        if(val > 0) {
            const onIds = Object.values(live.pitchPositions);
            const listHtml = db.players.filter(p => onIds.includes(p.id)).map(p => `<div class="action-btn" onclick="recordGoal('${p.id}')">${p.num?p.num+' ':''}${p.name}</div>`).join('');
            showActionModal("SELECT SCORER", listHtml || `<div class="action-btn" onclick="live.score.own++; addEvent('TEAM GOAL'); syncToCloud(); updateUI(); closeModals();">UNKNOWN / OTHER</div>`);
        } else if(live.score.own > 0) { live.score.own--; addEvent("GOAL CANCELLED"); syncToCloud(); updateUI(); }
    }
    function modifyOppScore(val) { live.score.opp = Math.max(0, live.score.opp + val); addEvent(val>0?"CONCEDED":"CANCELLED"); syncToCloud(); updateUI(); }
    function openBenchSelector(posId) {
        const onIds = Object.values(live.pitchPositions);
        const listHtml = db.players.filter(p => !onIds.includes(p.id)).map(p => `<div class="action-btn" onclick="live.pitchPositions['${posId}']='${p.id}'; syncToCloud(); updateUI(); closeModals();">${p.num?p.num+' ':''}${p.name}</div>`).join('');
        showActionModal("SUBSTITUTE IN", listHtml || "NO PLAYERS ON BENCH");
    }
    function openPositionSelector(pId) {
        const f = formations[live.formation];
        const listHtml = f.filter(pos => !live.pitchPositions[pos.id]).map(pos => `<div class="action-btn" onclick="live.pitchPositions['${pos.id}']='${pId}'; syncToCloud(); updateUI(); closeModals();">TO ${pos.label}</div>`).join('');
        showActionModal("ASSIGN POSITION", listHtml || "NO VACANT POSITIONS");
    }

    async function fetchReports() {
        const { data } = await supabaseClient.from('match_reports').select('*').order('created_at', { ascending: false });
        if (data) {
            document.getElementById('historyList').innerHTML = data.map(r => `
                <details class="report-item">
                    <summary>
                        <div style="display:flex; justify-content:space-between; font-size:11px; font-weight:900; color:#8e9aaf;"><span>${r.my_team} vs ${r.opponent}</span><span>${new Date(r.created_at).toLocaleDateString()}</span></div>
                        <div class="report-score">${r.score}</div>
                        <div style="font-size:11px; color:#8e9aaf; font-weight:700;">STADIUM: ${r.venue}</div>
                    </summary>
                    <div style="padding:20px; background:rgba(0,0,0,0.2); border-top:1px solid rgba(255,255,255,0.05);">
                        <div style="font-weight:900; color:#00d4ff; margin-bottom:5px;">EVENTS:</div><div style="white-space:pre-wrap; color:#fff; margin-bottom:15px; font-size:13px;">${r.detail}</div>
                        <div style="font-weight:900; color:#00d4ff; margin-bottom:5px;">NOTES:</div><div style="white-space:pre-wrap; color:#fff; font-size:13px;">${r.memo}</div>
                        <button class="del-row-btn" onclick="deleteReport('${r.id}')" style="margin-top:20px; background:#ff007a; color:#fff;">DELETE REPORT</button>
                    </div>
                </details>
            `).join('');
        }
    }
    async function deleteReport(id) { if(confirm("DELETE PERMANENTLY?")) { await supabaseClient.from('match_reports').delete().eq('id', id); fetchReports(); } }
    async function endPeriod() { if(confirm("SAVE AND FINISH MATCH?")) { await syncToCloud(); localStorage.setItem('ps_show_reports', 'true'); location.reload(); } }
    function addEvent(txt) { const time = formatTime(live.timerLeft); live.events.push({ time, text: txt }); const entry = document.createElement('div'); entry.textContent = `${time} ${txt}`; document.getElementById('eventLog').prepend(entry); }
    function formatTime(s) { return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }
    function toggleTimer() {
        const btn = document.getElementById('btnTimer');
        if(live.timerInterval) { clearInterval(live.timerInterval); live.timerInterval = null; btn.innerText = "RESUME"; }
        else { live.timerInterval = setInterval(() => { if(live.timerLeft > 0) live.timerLeft--; updateUI(); }, 1000); btn.innerText = "PAUSE"; }
    }
    function showTab(tabId, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); document.getElementById(tabId).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active');
        if(tabId === 'tabHistory') fetchReports();
    }
    function addMaster(type) {
        if(type==='players') {
            const num = document.getElementById('pInNum').value, name = document.getElementById('pInName').value.trim();
            if(name) { db.players.push({ id: Date.now().toString(), num, name, photo: currentPhotoData }); localStorage.setItem('ps_players_v9', JSON.stringify(db.players)); }
            else { alert("NAME REQUIRED"); return; }
            document.getElementById('pInNum').value = ''; document.getElementById('pInName').value = '';
            document.getElementById('pInPhotoPreview').style.display = 'none'; document.getElementById('photoIcon').style.display = 'block'; currentPhotoData = null;
        } else if(type==='opps') {
            const name = document.getElementById('oppInName').value.trim();
            if(name && !db.opps.includes(name)) { db.opps.push(name); localStorage.setItem('ps_opps_master', JSON.stringify(db.opps)); }
            document.getElementById('oppInName').value = '';
        } else if(type==='venues') {
            const name = document.getElementById('venueInName').value.trim();
            if(name && !db.venues.includes(name)) { db.venues.push(name); localStorage.setItem('ps_venues_master', JSON.stringify(db.venues)); }
            document.getElementById('venueInName').value = '';
        }
        refreshSettingsUI(); updateQuickLists();
    }
    function editPlayer(id) {
        const p = db.players.find(x => x.id === id);
        const newNum = prompt("EDIT NUMBER", p.num || "");
        const newName = prompt("EDIT NAME", p.name);
        if(newName !== null && newName.trim() !== "") {
            p.num = newNum; p.name = newName.trim();
            localStorage.setItem('ps_players_v9', JSON.stringify(db.players));
            refreshSettingsUI(); if(document.getElementById('liveScreen').style.display === 'block') updateUI();
        }
    }
    function deleteMaster(type, index) { 
        if(confirm("DELETE?")) { 
            db[type].splice(index, 1); 
            const key = type === 'players' ? 'ps_players_v9' : (type === 'opps' ? 'ps_opps_master' : 'ps_venues_master');
            localStorage.setItem(key, JSON.stringify(db[type])); 
            refreshSettingsUI(); updateQuickLists(); 
        } 
    }
    function refreshSettingsUI() {
        document.getElementById('pMasterList').innerHTML = db.players.map((p,i) => `<div class="chip-del">
            <div style="display:flex; align-items:center; gap:10px;">
                ${p.photo ? `<img src="${p.photo}" style="width:30px; height:30px; border-radius:50%; object-fit:cover; border:1px solid #00d4ff;">` : `<div style="width:30px; height:30px; border-radius:50%; background:rgba(255,255,255,0.05); border:1px dashed #8e9aaf;"></div>`}
                <span>${p.num?p.num+' ':''}${p.name}</span>
            </div>
            <div><span class="edit-btn" onclick="editPlayer('${p.id}')">✎</span><span class="del-btn" onclick="deleteMaster('players', ${i})">×</span></div>
        </div>`).join('');
        document.getElementById('oppMasterList').innerHTML = db.opps.map((o,i) => `<div class="chip-del">${o} <span class="del-btn" onclick="deleteMaster('opps', ${i})">×</span></div>`).join('');
        document.getElementById('venueMasterList').innerHTML = db.venues.map((v,i) => `<div class="chip-del">${v} <span class="del-btn" onclick="deleteMaster('venues', ${i})">×</span></div>`).join('');
    }
    function updateQuickLists() {
        document.getElementById('quickOppList').innerHTML = db.opps.map(x => `<span class="quick-chip" onclick="document.getElementById('oppName').value='${x}';">${x}</span>`).join('');
        document.getElementById('quickVenueList').innerHTML = db.venues.map(x => `<span class="quick-chip" onclick="document.getElementById('venueName').value='${x}';">${x}</span>`).join('');
    }
    function saveTeamName() { db.myTeam = document.getElementById('myTeamInput').value; localStorage.setItem('ps_myteam', db.myTeam); }
    function closeModals() { document.getElementById('actionModal').style.display = 'none'; }
    function showActionModal(title, html) { document.getElementById('modalTitle').innerText = title; document.getElementById('modalList').innerHTML = html; document.getElementById('actionModal').style.display = 'flex'; }
</script>
</body>
</html>
