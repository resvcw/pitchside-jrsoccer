<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PITCHSIDE CLOUD</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        /* リバプール・レッドを基調としたデザインに復元 */
        :root { --lfc-red: #e31b23; --pitch-green: #065f46; --ui-dark: #111111; --text-white: #ffffff; }
        body { margin: 0; background-color: var(--ui-dark); color: var(--text-white); font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        .tab-content { display: none; padding: 15px; padding-bottom: 90px; height: 100vh; box-sizing: border-box; }
        .active { display: block; }
        
        /* ログイン画面（赤ベース） */
        #loginSection { background: linear-gradient(135deg, var(--lfc-red) 0%, #9e1217 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .login-card { background: rgba(0,0,0,0.2); padding: 30px; border-radius: 15px; backdrop-filter: blur(5px); width: 85%; max-width: 320px; border: 1px solid rgba(255,255,255,0.2); }

        /* 入力エリア */
        input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 5px; border: none; background: white; color: #333; box-sizing: border-box; font-size: 16px; }
        .btn { background: #f6eb61; color: #000; border: none; padding: 15px; border-radius: 5px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        
        /* 緑のピッチ */
        .pitch { position: relative; width: 100%; aspect-ratio: 2/3; background-color: var(--pitch-green); border: 2px solid white; border-radius: 5px; margin: 10px 0; }
        .center-line { position: absolute; top: 50%; width: 100%; height: 2px; background: white; }
        .center-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70px; height: 70px; border: 2px solid white; border-radius: 50%; }

        nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; }
        .nav-item { color: #888; font-size: 11px; text-align: center; flex: 1; }
        .nav-item.active-nav { color: var(--lfc-red); font-weight: bold; }
        
        .score-display { display: flex; justify-content: space-between; align-items: center; padding: 15px; font-size: 24px; font-weight: 900; background: #1a1a1a; border-radius: 5px; }
    </style>
</head>
<body>

<div id="loginSection" class="tab-content active">
    <div class="login-card">
        <h1 style="font-size:24px; margin-bottom:5px;">PITCHSIDE CLOUD</h1>
        <p style="font-size:12px; margin-bottom:25px; opacity:0.8;">YNWA - Junior Soccer Management</p>
        <input type="password" id="passcode" placeholder="ENTER PASSCODE">
        <button class="btn" onclick="checkPass()">LOGIN</button>
    </div>
</div>

<div id="mainUI" style="display:none;">
    <div id="live" class="tab-content active">
        <input type="text" id="opponentName" placeholder="対戦相手を入力">
        <div class="score-display">
            <span id="displayMyTeam">自チーム</span>
            <span style="font-size:32px; color:var(--lfc-red);"><span id="hScore">0</span> - <span id="aScore">0</span></span>
            <span>相手</span>
        </div>
        <div class="pitch" onclick="countGoal(event)">
            <div class="center-line"></div>
            <div class="center-circle"></div>
        </div>
        <button class="btn" style="background:#cc0000; color:white; margin-top:10px;" onclick="endAndSave()">END & SAVE TO CLOUD</button>
    </div>

    <div id="reports" class="tab-content">
        <h2 style="border-bottom:2px solid var(--lfc-red); padding-bottom:5px;">MATCH REPORTS</h2>
        <div id="historyList">Loading...</div>
    </div>

    <nav>
        <div class="nav-item active-nav" onclick="showTab('live', this)">LIVE</div>
        <div class="nav-item" onclick="showTab('reports', this)">REPORTS</div>
    </nav>
</div>

<script>
    const SUPABASE_URL = 'https://gdzdyykladyccrcvdtbh.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkemR5eWtsYWR5Y2NyY3ZkdGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNDU3MjgsImV4cCI6MjA4OTgyMTcyOH0.FKqWkB-yHehST6A-IRUv3r0-f9nR6SynOqLTp2_r1Dw'; 
    let _supabase;
    let homeScore = 0;

    window.onload = () => {
        if (typeof supabase !== 'undefined') {
            _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        }
    };

    function checkPass() {
        if(document.getElementById('passcode').value === "2026kickoff") {
            document.getElementById('loginSection').classList.remove('active');
            document.getElementById('mainUI').style.display = 'block';
        } else { alert("WRONG PASSCODE"); }
    }

    function showTab(id, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        el.classList.add('active-nav');
        if(id === 'reports') fetchReports();
    }

    function countGoal() {
        homeScore++;
        document.getElementById('hScore').innerText = homeScore;
    }

    async function endAndSave() {
        const opponent = document.getElementById('opponentName').value || "Unknown";
        if(!confirm("Save record against " + opponent + "?")) return;
        const { error } = await _supabase.from('match_reports').insert([{ opponent: opponent, score: homeScore + " - 0", created_at: new Date() }]);
        if (error) alert(error.message); else alert("SAVED!");
    }

    async function fetchReports() {
        const { data } = await _supabase.from('match_reports').select('*').order('created_at', { ascending: false });
        if (data) {
            document.getElementById('historyList').innerHTML = data.map(r => `
                <div style="background:#222; padding:15px; border-radius:5px; margin-bottom:10px; border-left:4px solid var(--lfc-red);">
                    <div style="color:var(--lfc-red); font-weight:bold;">vs ${r.opponent}</div>
                    <div style="font-size:24px;">${r.score}</div>
                </div>
            `).join('');
        }
    }
</script>
</body>
</html>
