<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PITCHSIDE CLOUD</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; }
        .tab-content { display: none; height: calc(100vh - 70px); overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .active { display: block; }
        nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--card); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #334155; }
        .nav-item { color: #94a3b8; font-size: 12px; text-align: center; text-decoration: none; }
        .nav-item.active-nav { color: var(--accent); }
        .pitch { position: relative; width: 100%; aspect-ratio: 2/3; background: #065f46; border: 2px solid #fff; border-radius: 8px; margin-top: 10px; }
        .btn { background: var(--accent); color: var(--bg); border: none; padding: 10px 20px; border-radius: 6px; font-weight: 900; width: 100%; margin-top: 10px; }
        .score-board { display: flex; justify-content: space-between; font-size: 32px; font-weight: 900; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: #fff; box-sizing: border-box; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="loginSection" class="tab-content active" style="padding-top:100px;">
    <h1 style="text-align:center;">PITCHSIDE CLOUD</h1>
    <input type="password" id="passcode" placeholder="Passcode">
    <button class="btn" onclick="checkPass()">LOGIN</button>
</div>

<div id="mainUI" style="display:none;">
    <div id="live" class="tab-content active">
        <div class="score-board">
            <span id="teamNameDisp">HOME</span>
            <span><span id="hScore">0</span> - <span id="aScore">0</span></span>
            <span>AWAY</span>
        </div>
        <div class="pitch" onclick="addEvent(event)">
            <div style="position:absolute; top:50%; width:100%; height:2px; background:rgba(255,255,255,0.3);"></div>
        </div>
        <button class="btn" style="background:#ef4444; color:#fff;" onclick="endHalf()">END HALF & SAVE</button>
    </div>

    <div id="reports" class="tab-content">
        <h2>CLOUD REPORTS</h2>
        <div id="historyList">読み込み中...</div>
    </div>

    <div id="settings" class="tab-content">
        <h2>SETTINGS</h2>
        <input type="text" id="myTeamName" placeholder="自チーム名" onchange="updateTeamName()">
    </div>

    <nav id="bottomNav">
        <div class="nav-item active-nav" onclick="showTab('live', this)">LIVE</div>
        <div class="nav-item" onclick="showTab('reports', this)">REPORTS</div>
        <div class="nav-item" onclick="showTab('settings', this)">SETTINGS</div>
    </nav>
</div>

<script>
    const SUPABASE_URL = 'https://gdzdyykladyccrcvdtbh.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkemR5eWtsYWR5Y2NyY3ZkdGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNDU3MjgsImV4cCI6MjA4OTgyMTcyOH0.FKqWkB-yHehST6A-IRUv3r0-f9nR6SynOqLTp2_r1Dw'; 
    let _supabase;
    let homeScore = 0; let awayScore = 0; let matchEvents = [];

    window.onload = () => {
        if (typeof supabase !== 'undefined') {
            _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        }
    };

    function checkPass() {
        if(document.getElementById('passcode').value === "2026kickoff") {
            document.getElementById('loginSection').classList.remove('active');
            document.getElementById('mainUI').style.display = 'block';
            showTab('live', document.querySelector('.nav-item'));
            fetchReports();
        } else { alert("パスコードが違います"); }
    }

    function showTab(id, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        el.classList.add('active-nav');
        if(id === 'reports') fetchReports();
    }

    function addEvent(e) {
        homeScore++;
        document.getElementById('hScore').innerText = homeScore;
        const rect = e.target.getBoundingClientRect();
        matchEvents.push({ x: e.clientX - rect.left, y: e.clientY - rect.top, time: new Date() });
    }

    async function endHalf() {
        if(!confirm("現在のスコアをクラウドに保存しますか？")) return;
        const report = {
            opponent: "練習試合",
            score: `${homeScore} - ${awayScore}`,
            details: JSON.stringify(matchEvents),
            created_at: new Date()
        };
        const { error } = await _supabase.from('match_reports').insert([report]);
        if (error) { alert("保存失敗: " + error.message); } 
        else { alert("クラウドに保存しました！"); homeScore=0; awayScore=0; matchEvents=[]; }
    }

    async function fetchReports() {
        const { data } = await _supabase.from('match_reports').select('*').order('created_at', { ascending: false });
        if (data) {
            document.getElementById('historyList').innerHTML = data.map(r => `
                <div class="card">
                    <div style="font-size:12px; color:var(--accent);">vs ${r.opponent}</div>
                    <div style="font-size:24px; font-weight:900;">${r.score}</div>
                    <div style="font-size:10px; color:#94a3b8;">${new Date(r.created_at).toLocaleString()}</div>
                </div>
            `).join('');
        }
    }

    function updateTeamName() {
        document.getElementById('teamNameDisp').innerText = document.getElementById('myTeamName').value;
    }
</script>
</body>
</html>
