<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PitchSide Pro v11.1 | Professional Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #D4AF37;
            --bg: #000000;
            --card-bg: #111111;
            --text-main: #FFFFFF;
            --text-sub: #888888;
            --border: #222222;
            --accent-green: #00FF41;
            --accent-red: #FF3131;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); padding-bottom: 100px; -webkit-tap-highlight-color: transparent; }
        
        .container { max-width: 500px; margin: 0 auto; padding: 0 15px; }
        .tab-content { display: none; padding: 15px 0; }
        .tab-content.active { display: block; }
        
        .card { background: var(--card-bg); border: 1px solid var(--border); padding: 20px; margin-bottom: 20px; }
        
        /* Typography */
        h1, h2, h3, .heading, .timer-display, .score-val, .qs-val { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 0.05em; }

        /* Forms */
        .form-label { display: block; font-size: 10px; font-weight: 900; color: var(--text-sub); margin-bottom: 6px; letter-spacing: 1px; }
        input, select, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); color: #fff; font-size: 14px; outline: none; border-radius: 0; }
        input:focus { border-color: var(--primary); }
        
        button { background: var(--primary); color: #000; border: none; padding: 15px; font-weight: 900; width: 100%; cursor: pointer; font-family: 'Oswald'; font-size: 15px; }
        button:disabled { background: #333; color: #666; }
        button.ghost { background: transparent; border: 1px solid var(--border); color: #fff; }

        /* Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #000; display: flex; padding: 12px 10px 25px; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { flex: 1; text-align: center; font-size: 10px; color: var(--text-sub); font-weight: 800; cursor: pointer; font-family: 'Oswald'; }
        .nav-item.active { color: var(--primary); }

        /* Pitch & Icons */
        .pitch { width: 100%; aspect-ratio: 3/4; background: #081a0e; position: relative; border: 2px solid var(--border); margin-bottom: 15px; overflow: hidden; }
        .pitch::before { content: ''; position: absolute; top: 50%; width: 100%; height: 1px; background: rgba(255,255,255,0.1); }
        .player-icon { position: absolute; width: 54px; text-align: center; transform: translate(-50%,-50%); z-index: 10; touch-action: none; }
        .icon-jersey { width: 38px; height: 38px; background: #000; border: 1.5px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Oswald'; font-weight: 700; position: relative; }
        .jersey-num-overlay { position: absolute; bottom: -2px; right: -2px; background: var(--primary); color: #000; font-size: 8px; padding: 1px 3px; font-weight: 900; }
        .icon-name { font-size: 9px; font-weight: 800; color: #fff; margin-top: 4px; white-space: nowrap; }
        
        /* Stats Grid */
        .qs-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .qs-card { background: var(--card-bg); border: 1px solid var(--border); padding: 14px 5px; text-align: center; }
        .qs-val { font-size: 24px; color: var(--primary); }
        .qs-label { font-size: 9px; font-weight: 900; color: var(--text-sub); margin-top: 4px; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; align-items: flex-end; }
        .modal-content { background: var(--card-bg); width: 100%; padding: 30px 20px; border-top: 2px solid var(--primary); max-height: 80vh; overflow-y: auto; }
        .action-btn { background: #000; border: 1px solid var(--border); padding: 15px; margin-bottom: 8px; text-align: center; font-weight: 700; cursor: pointer; }
        
        .player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px,1fr)); gap: 8px; margin-top: 15px; }
        .player-chip { background: #000; border: 1px solid var(--border); padding: 10px 5px; text-align: center; font-size: 11px; font-weight: 700; cursor: pointer; position: relative; }
        .player-chip.on-pitch { border-color: var(--accent-green); }
    </style>
</head>
<body>

<div id="loginSection" class="container" style="padding-top:100px; text-align:center;">
    <h1 style="font-size:48px; color:var(--primary); margin-bottom:4px;">PITCHSIDE</h1>
    <p style="font-size:10px; letter-spacing:3px; color:var(--text-sub); margin-bottom:40px; font-weight:900;">ADVANCED DX SYSTEM</p>
    <input type="password" id="passcode" placeholder="ENTER CODE" style="text-align:center; letter-spacing:10px; margin-bottom:15px;" onkeydown="if(event.key==='Enter')checkPass()">
    <button onclick="checkPass()">AUTHENTICATE</button>
</div>

<div id="mainUI" style="display:none;">
    <div class="container">
        <div id="tabHome" class="tab-content active">
            <div style="margin-bottom:24px;">
                <p class="form-label">Active Squad</p>
                <h2 id="heroTeamName" style="font-size:32px;">SELECT TEAM</h2>
                <p id="heroTeamCat" style="color:var(--text-sub); font-size:12px; font-weight:700;"></p>
            </div>

            <div class="qs-grid">
                <div class="qs-card"><div class="qs-val" id="hsTotal">0</div><div class="qs-label">MATCHES</div></div>
                <div class="qs-card"><div class="qs-val" id="hsWins" style="color:var(--accent-green)">0</div><div class="qs-label">WINS</div></div>
                <div class="qs-card"><div class="qs-val" id="hsLoss" style="color:var(--accent-red)">0</div><div class="qs-label">LOSS</div></div>
                <div class="qs-card"><div class="qs-val" id="hsRate">0%</div><div class="qs-label">WIN RATE</div></div>
            </div>

            <div class="card">
                <p class="form-label">Initialize Session</p>
                <div class="form-group"><input type="text" id="homeOppName" placeholder="OPPONENT NAME"></div>
                <div style="display:flex; gap:8px; margin-bottom:15px;">
                    <select id="homeVenue" style="flex:1;"><option value="">VENUE</option></select>
                    <select id="homeMinutes" style="flex:1;"><option value="15">15 MIN</option><option value="20">20 MIN</option></select>
                </div>
                <div class="form-group">
                    <select id="heroTeamSelect" onchange="updateHeroCategorySelect()"><option value="">SELECT SQUAD</option></select>
                </div>
                <button onclick="startMatch()">START SESSION</button>
            </div>
            <div class="form-label">Recent Results</div>
            <div id="homeRecentMatches"></div>
        </div>

        <div id="tabReports" class="tab-content">
            <h2 style="margin-bottom:20px;">ARCHIVES</h2>
            <div id="historyList"></div>
        </div>

        <div id="tabSettings" class="tab-content">
            <h2 style="margin-bottom:20px;">CONFIGURATION</h2>
            <div class="card">
                <p class="form-label">Team Master</p>
                <div id="teamMasterList" style="margin-bottom:15px;"></div>
                <div style="display:flex; gap:8px;">
                    <input type="text" id="teamInName" placeholder="NAME" style="flex:1;">
                    <input type="text" id="categoryInName" placeholder="CAT" style="flex:1;">
                    <button onclick="addMaster('teams_master')" style="width:auto; padding:10px 20px;">ADD</button>
                </div>
            </div>
            <div class="card">
                <p class="form-label">Player Roster</p>
                <div id="pMasterListGrouped"></div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" id="navHome" onclick="showTab('tabHome',this)">DASHBOARD</div>
        <div class="nav-item" id="navReports" onclick="showTab('tabReports',this)">ARCHIVES</div>
        <div class="nav-item" id="navSettings" onclick="showTab('tabSettings',this)">CONFIG</div>
    </nav>
</div>

<div id="liveOverlay" style="display:none; position:fixed; inset:0; background:#000; z-index:2000; overflow-y:auto;">
    <div class="container" style="padding-top:30px;">
        <div class="timer-display" id="timerText">15:00</div>
        <div style="display:flex; justify-content:space-around; align-items:flex-end; margin-bottom:30px;">
            <div style="text-align:center; width:40%;">
                <p class="form-label" id="myTeamDisplay">HOME</p>
                <div class="score-val" id="scoreOwn">0</div>
                <div style="display:flex; gap:8px;"><button class="ghost" onclick="modifyOwnScore(-1)">-</button><button class="ghost" onclick="modifyOwnScore(1)">+</button></div>
            </div>
            <div style="font-family:'Oswald'; color:var(--text-sub); margin-bottom:50px;">VS</div>
            <div style="text-align:center; width:40%;">
                <p class="form-label" id="oppDisplay">AWAY</p>
                <div class="score-val" id="scoreOpp">0</div>
                <div style="display:flex; gap:8px;"><button class="ghost" onclick="modifyOppScore(-1)">-</button><button class="ghost" onclick="modifyOppScore(1)">+</button></div>
            </div>
        </div>
        <button id="btnTimer" onclick="toggleTimer()" style="margin-bottom:20px;">START TIMER</button>
        <div class="pitch" id="livePitchArea"></div>
        <div id="onPitchGrid" class="player-grid"></div>
        <div id="benchGrid" class="player-grid"></div>
        <button class="ghost" onclick="endPeriod()" style="margin-top:30px;">FINALIZE MATCH</button>
    </div>
</div>

<div id="actionModal" class="modal-overlay" onclick="closeModals()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 id="modalTitle" style="margin-bottom:20px; font-family:'Oswald';">SELECT ACTION</h3>
        <div id="modalList"></div>
        <button class="ghost" onclick="closeModals()" style="margin-top:15px;">CLOSE</button>
    </div>
</div>

<script>
const SUPABASE_URL='https://gdzdyykladyccrcvdtbh.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkemR5eWtsYWR5Y2NyY3ZkdGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNDU3MjgsImV4cCI6MjA4OTgyMTcyOH0.FKqWkB-yHehST6A-IRUv3r0-f9nR6SynOqLTp2_r1Dw';
const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let db={teams:[],players:[],venues:[]};
let live={currentId:null,timerInterval:null,timerLeft:0,score:{own:0,opp:0},events:[],pitchPositions:{},playerGoals:{},selectedTeam:"",selectedCategory:"",lastTickTime:null};
const formations={"3-3-1":[{id:'gk',t:'90%',l:'50%',label:'GK'},{id:'df1',t:'75%',l:'20%',label:'DFL'},{id:'df2',t:'75%',l:'50%',label:'DFC'},{id:'df3',t:'75%',l:'80%',label:'DFR'},{id:'mf1',t:'45%',l:'20%',label:'MFL'},{id:'mf2',t:'45%',l:'50%',label:'MFC'},{id:'mf3',t:'45%',l:'80%',label:'MFR'},{id:'fw1',t:'20%',l:'50%',label:'FW'}]};

window.addEventListener('load',async()=>{
    if(localStorage.getItem('ps_logged_in')==='true'){
        document.getElementById('loginSection').style.display='none';
        document.getElementById('mainUI').style.display='block';
        await loadMasterData();
        refreshSettingsUI();
        fetchReports();
    }
});

function checkPass(){if(document.getElementById('passcode').value==='2026'){localStorage.setItem('ps_logged_in','true');location.reload();}}

async function loadMasterData(){
    const res = await Promise.all([
        supabaseClient.from('teams_master').select('*').order('team'),
        supabaseClient.from('players_master').select('*').order('num'),
        supabaseClient.from('venues_master').select('*').order('created_at')
    ]);
    db.teams = res[0].data || [];
    db.players = res[1].data || [];
    db.venues = res[2].data || [];
}

function showTab(tabId,el){
    document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    if(el) el.classList.add('active');
    if(tabId==='tabReports') fetchReports();
}

async function startMatch(){
    const team=document.getElementById('heroTeamSelect').value;
    const opp=document.getElementById('homeOppName').value;
    const mins=parseInt(document.getElementById('homeMinutes').value);
    if(!team || !opp) return alert("REQUIRED: TEAM & OPPONENT");

    const {data, error} = await supabaseClient.from('matches').insert([{
        my_team: team, opponent: opp, score: "0 - 0", detail: "SESSION START"
    }]).select();

    if(!error && data){
        live.currentId = data[0].id;
        live.timerLeft = mins * 60;
        live.score = {own:0, opp:0};
        live.selectedTeam = team;
        document.getElementById('myTeamDisplay').textContent = team;
        document.getElementById('oppDisplay').textContent = opp;
        document.getElementById('liveOverlay').style.display = 'block';
        updateUI();
    }
}

function updateUI(){
    document.getElementById('timerText').textContent = formatTime(live.timerLeft);
    document.getElementById('scoreOwn').textContent = live.score.own;
    document.getElementById('scoreOpp').textContent = live.score.opp;
    
    const pitch = document.getElementById('livePitchArea');
    pitch.innerHTML = '';
    formations["3-3-1"].forEach(pos=>{
        const pId = live.pitchPositions[pos.id], p = db.players.find(x=>x.id===pId), slot = document.createElement('div');
        slot.className = 'player-icon'; slot.style.top = pos.t; slot.style.left = pos.l;
        if(!p) slot.innerHTML = `<div class="icon-jersey" style="border-style:dashed;opacity:0.2;" onclick="choosePlayerFor('${pos.id}')">+</div><div class="icon-name">${pos.label}</div>`;
        else {
            slot.innerHTML = `<div class="icon-jersey" onclick="showPlayerActions('${p.id}','${pos.id}')"><span class="jersey-num-overlay">${p.num||''}</span></div><div class="icon-name">${p.name}</div>`;
        }
        pitch.appendChild(slot);
    });

    const benchGrid = document.getElementById('benchGrid'); benchGrid.innerHTML = '';
    db.players.filter(p=>p.team===live.selectedTeam && !Object.values(live.pitchPositions).includes(p.id)).forEach(p=>{
        const chip = document.createElement('div'); chip.className = 'player-chip';
        chip.innerHTML = `#${p.num} ${p.name}`; chip.onclick = ()=>assignPlayerDirect(p.id);
        benchGrid.appendChild(chip);
    });
}

function formatTime(s){const m=Math.floor(s/60),sc=s%60;return `${m.toString().padStart(2,'0')}:${sc.toString().padStart(2,'0')}`;}

function toggleTimer(){
    const btn = document.getElementById('btnTimer');
    if(live.timerInterval){ clearInterval(live.timerInterval); live.timerInterval=null; btn.textContent="RESUME"; }
    else {
        live.lastTickTime = Date.now();
        live.timerInterval = setInterval(()=>{
            live.timerLeft = Math.max(0, live.timerLeft - 1); updateUI();
            if(live.timerLeft===0) clearInterval(live.timerInterval);
        },1000);
        btn.textContent = "STOP";
    }
}

function modifyOwnScore(v){ live.score.own = Math.max(0, live.score.own + v); updateUI(); sync(); }
function modifyOppScore(v){ live.score.opp = Math.max(0, live.score.opp + v); updateUI(); sync(); }
async function sync(){ if(live.currentId) await supabaseClient.from('matches').update({score:`${live.score.own} - ${live.score.opp}`}).eq('id',live.currentId); }

async function fetchReports(){
    const {data} = await supabaseClient.from('matches').select('*').order('created_at',{ascending:false});
    if(data) {
        const list = document.getElementById('historyList');
        list.innerHTML = data.map(r=> `
            <div style="border-bottom:1px solid var(--border); padding:15px 0;">
                <p class="form-label">${new Date(r.created_at).toLocaleDateString()}</p>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div style="font-weight:800;">VS ${r.opponent}</div>
                    <div style="font-family:'Oswald'; font-size:24px; color:var(--primary);">${r.score}</div>
                </div>
            </div>
        `).join('');
        document.getElementById('hsTotal').textContent = data.length;
    }
}

async function addMaster(type){
    if(type==='teams_master'){
        const team=document.getElementById('teamInName').value, cat=document.getElementById('categoryInName').value;
        await supabaseClient.from('teams_master').insert([{team, category:cat}]);
        location.reload();
    }
}

function refreshSettingsUI(){
    document.getElementById('teamMasterList').innerHTML = db.teams.map(t=>`<div style="padding:10px; border:1px solid var(--border); margin-bottom:5px;">${t.team} (${t.category})</div>`).join('');
    document.getElementById('heroTeamSelect').innerHTML += db.teams.map(t=>`<option value="${t.team}">${t.team}</option>`).join('');
}

function choosePlayerFor(posId){
    const bench = db.players.filter(p=>p.team===live.selectedTeam && !Object.values(live.pitchPositions).includes(p.id));
    showActionModal("ASSIGN PLAYER", bench.map(p=>`<div class="action-btn" onclick="live.pitchPositions['${posId}']='${p.id}';closeModals();updateUI();">#${p.num} ${p.name}</div>`).join(''));
}
function endPeriod(){ if(confirm("END MATCH?")){ clearInterval(live.timerInterval); document.getElementById('liveOverlay').style.display='none'; fetchReports(); } }
function closeModals(){document.getElementById('actionModal').style.display='none';}
function showActionModal(title,html){document.getElementById('modalTitle').textContent=title; document.getElementById('modalList').innerHTML=html; document.getElementById('actionModal').style.display='flex';}
</script>
</body>
</html>
