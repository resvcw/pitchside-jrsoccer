<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PitchSide Pro v10.0.0 - プレミアムUI & クラウドストレージ完全対応</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #1a2a3a; --accent: #2ecc71; --secondary: #e74c3c;
            --bg: #f0f3f7; --card-bg: #ffffff; --text-main: #2c3e50;
            --text-sub: #7f8c8d; --border: #e2e8f0;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            --gradient: linear-gradient(135deg, #1a2a3a 0%, #34495e 100%);
        }
        *, *::before, *::after { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        html, body { overflow-x: hidden; width: 100%; position: relative; }
        body { font-family: 'Inter', -apple-system, "Hiragino Sans", sans-serif; background: var(--bg); margin: 0; padding-bottom: 100px; color: var(--text-main); user-select: none; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; }
        
        .container { max-width: 500px; margin: 0 auto; min-height: 100vh; padding: 0 15px; transition: transform 0.2s cubic-bezier(0,0,0.2,1); }
        .tab-content { display: none; padding: 15px 0; }
        .tab-content.active { display: block; animation: slideUp 0.4s cubic-bezier(0,0,0.2,1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        #ptr-indicator { position: absolute; top: -60px; left: 0; width: 100%; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: var(--primary); pointer-events: none; z-index: 3000; display: none; }
        .spinner { width: 20px; height: 20px; border: 2px solid #ddd; border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .card { background: var(--card-bg); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); position: relative; overflow: hidden; }
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 12px; font-weight: 800; color: var(--text-sub); margin-bottom: 6px; letter-spacing: 0.5px; }
        
        input[type="text"], input[type="number"], select, textarea { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; font-size: 15px; font-weight: 600; outline: none; background: #fdfdfd; color: var(--text-main); transition: 0.2s; }
        input:focus, select:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(26, 42, 58, 0.05); }
        
        button { background: var(--gradient); color: #fff; border: none; padding: 16px; border-radius: 14px; font-weight: 800; width: 100%; cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 4px 12px rgba(26, 42, 58, 0.2); display: flex; align-items: center; justify-content: center; gap: 8px;}
        button:active { transform: scale(0.96); opacity: 0.9; }
        button:disabled { background: #bdc3c7; cursor: not-allowed; box-shadow: none; }
        
        /* 画像アップロード用UI */
        .photo-upload-wrap { width: 64px; height: 64px; border-radius: 50%; background: #f0f3f7; border: 2px dashed #cbd5e0; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; flex-shrink: 0; }
        .photo-upload-wrap img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; display: none; }
        .photo-upload-wrap .upload-icon { font-size: 20px; color: #a0aec0; }
        .photo-upload-wrap:active { opacity: 0.7; }

        .report-item { margin-bottom: 12px; background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden; }
        .report-item summary { padding: 18px; cursor: pointer; list-style: none; outline: none; display: flex; align-items: center; gap: 15px; }
        .report-score { font-size: 26px; font-weight: 800; color: var(--primary); margin: 6px 0; }

        .live-header { background: #fff; color: var(--text-main); padding: 20px; border-radius: 20px; margin-bottom: 20px; text-align: center; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .timer-display { font-size: 44px; font-weight: 900; font-variant-numeric: tabular-nums; color: var(--primary); }
        
        .score-board { display: grid; grid-template-columns: 1fr auto 1fr; align-items: end; margin-top: 15px; background: #f8f9fa; padding: 15px; border-radius: 12px; gap: 10px; border: 1px solid var(--border); }
        .score-team-box { text-align: center; display: flex; flex-direction: column; align-items: center; }
        .score-team-name { font-size: 11px; font-weight: 800; color: var(--text-sub); margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; text-transform: uppercase; height: 14px; line-height: 14px; }
        .score-ctrl { display: flex; align-items: center; justify-content: center; gap: 8px; }
        .score-btn { width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border); background: #fff; color: var(--primary); font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .score-val { font-size: 30px; font-weight: 800; min-width: 36px; text-align: center; line-height: 34px; }
        .vs-text { font-size: 14px; font-weight: 800; color: #bdc3c7; padding-bottom: 8px; }

        .pitch { width: 100%; aspect-ratio: 3/4; background: #27ae60; position: relative; border-radius: 16px; overflow: hidden; margin-top: 15px; border: 4px solid #2ecc71; box-shadow: inset 0 0 30px rgba(0,0,0,0.2); }
        .pitch::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 2px; background: rgba(255,255,255,0.3); transform: translateY(-50%); }
        .pitch::after { content: ''; position: absolute; top: 50%; left: 50%; width: 80px; height: 80px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; transform: translate(-50%, -50%); }
        
        .player-icon { position: absolute; width: 56px; text-align: center; transform: translate(-50%, -50%); z-index: 10; cursor: pointer; touch-action: none; }
        .icon-jersey { width: 42px; height: 42px; background: #fff; border: 2px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto; font-size: 14px; font-weight: 800; position: relative; box-shadow: 0 4px 8px rgba(0,0,0,0.15); overflow: hidden; }
        .icon-jersey img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; }
        .jersey-num-overlay { position: relative; z-index: 2; color: var(--primary); text-shadow: 0 0 4px #fff, 0 0 4px #fff; }
        .icon-name { font-size: 9px; font-weight: 800; color: #fff; background: rgba(26, 42, 58, 0.9); padding: 2px 6px; border-radius: 4px; margin-top: 4px; white-space: nowrap; }

        .player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; margin-top: 15px; }
        .player-chip { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 10px 5px; text-align: center; font-size: 11px; font-weight: 700; cursor: pointer; position: relative; touch-action: none; box-shadow: 0 2px 5px rgba(0,0,0,0.03); display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .player-chip.on-pitch { border-color: var(--accent); border-width: 2px; }
        .player-chip.bench { color: var(--text-sub); background: #f8f9fa; }
        .chip-num { position: absolute; top: -5px; left: -5px; background: var(--primary); color: #fff; font-size: 8px; padding: 1px 5px; border-radius: 4px; font-weight: 800; z-index: 2; }
        .chip-photo { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; }

        .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .dash-card { background: #fff; border: 1px solid var(--border); border-radius: 16px; padding: 15px; text-align: center; box-shadow: var(--shadow); }
        .dash-val { font-size: 28px; font-weight: 900; color: var(--primary); margin: 5px 0; }
        .dash-label { font-size: 11px; font-weight: 800; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.5px;}
        .dash-list { list-style: none; padding: 0; margin: 0; }
        .dash-list li { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px solid var(--border); font-size: 14px; font-weight: 800; }
        .dash-list li:last-child { border-bottom: none; }
        
        .accordion { margin-bottom: 12px; border-radius: 16px; overflow: hidden; background: #fff; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .accordion-header { padding: 15px 20px; cursor: pointer; background: #fff; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .accordion-header:active { background: #f8f9fa; }
        .accordion-header .team-info { display: flex; align-items: center; gap: 10px; }
        .accordion-header .team-logo { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; background: #eee; }
        .accordion-header h3 { margin: 0; font-size: 15px; font-weight: 800; color: var(--primary); }
        .accordion-content { display: none; padding: 15px; background: #fafbfc; border-top: 1px solid var(--border); }
        .accordion.open .accordion-content { display: block; }
        
        .player-tile-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .player-tile { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 10px; display: flex; align-items: center; gap: 10px; position: relative; transition: 0.2s; }
        .player-tile:active { transform: translateY(-2px); border-color: var(--accent); }
        .tile-photo { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: var(--text-sub); }
        .tile-name { font-size: 13px; font-weight: 800; color: var(--text-main); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .tile-edit { color: #cbd5e0; font-size: 14px; cursor: pointer; padding: 4px; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); display: flex; padding: 12px 10px 25px; border-top: 1px solid var(--border); box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 1000; }
        .nav-item { flex: 1; text-align: center; font-size: 11px; color: #a0aec0; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--primary); }
        .nav-item.active::after { content: ''; display: block; width: 4px; height: 4px; background: var(--primary); border-radius: 50%; margin: 6px auto 0; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #fff; width: 100%; max-width: 400px; border-radius: 20px; padding: 25px; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.2); max-height: 85vh; overflow-y: auto; }
        .action-btn { background: #f8f9fa; border: 1px solid var(--border); padding: 14px; border-radius: 12px; font-weight: 800; margin-bottom: 8px; text-align: center; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s;}
        .action-btn:active { background: var(--primary); color: #fff; }

        #full-loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(26, 42, 58, 0.95); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; color: #fff; font-weight: 800;}

        @media print {
            body { background: #fff; padding: 0; color: #000; }
            .bottom-nav, .nav-item, button, #loginSection, .modal-overlay, .tab-content { display: none !important; }
            .container { max-width: 100%; padding: 0; margin: 0; box-shadow: none; }
            #tabDashboard { display: block !important; } 
            .card { border: 2px solid #333; box-shadow: none; break-inside: avoid; margin-bottom: 20px; }
            .dash-card { border: 1px solid #ccc; box-shadow: none; }
            h2 { color: #000 !important; border-bottom: 2px solid #000; padding-bottom: 10px; }
            #dashFilters { display: none !important; }
            @page { size: A4 portrait; margin: 15mm; }
        }
    </style>
</head>
<body>

<div id="ptr-indicator"><div class="spinner" id="ptr-spinner"></div><span id="ptr-text">スワイプして更新</span></div>

<div class="container" id="appContainer">
    <div id="loginSection" style="padding:100px 20px; text-align:center;">
        <h1 style="font-size:24px; font-weight:900; letter-spacing:-1px; color:var(--primary);">PitchSide Pro <span style="color:var(--accent);">v10.0</span></h1>
        <div class="form-group" style="margin:40px 0;"><input type="password" id="passcode" placeholder="Passcode" style="text-align:center; font-size:20px; letter-spacing: 4px;"></div>
        <button id="loginBtn" onclick="checkPass()">ENTER APP</button>
    </div>

    <div id="mainUI" style="display:none;">
        <div id="tabLive" class="tab-content active">
            <div id="setupScreen">
                <div class="card">
                    <h2 style="font-size:18px; font-weight:900; margin:0 0 20px 0;">試合設定</h2>
                    <div class="form-group"><label class="form-label">自チーム</label><select id="setupMyTeam"><option value="">選択してください</option></select></div>
                    <div class="form-group"><label class="form-label">対戦相手</label><input type="text" id="oppName" placeholder="対戦チーム名を入力"></div>
                    <div class="form-group"><label class="form-label">会場</label><input type="text" id="venueName" placeholder="会場名を入力"></div>
                    <div style="display:flex; gap:15px;">
                        <div class="form-group" style="flex:1;"><label class="form-label">時間</label><select id="halfMinutes"><option value="15" selected>15分</option><option value="20">20分</option></select></div>
                        <div class="form-group" style="flex:1;"><label class="form-label">布陣</label><select id="formationSelect"><option value="3-3-1">3-3-1</option><option value="2-4-1">2-4-1</option></select></div>
                    </div>
                    <button onclick="startMatch()" style="margin-top:15px; height:60px; font-size:18px;">キックオフ</button>
                </div>
            </div>

            <div id="liveScreen" style="display:none;">
                <div class="live-header">
                    <div class="timer-display" id="timerText">15:00</div>
                    <div style="display:flex; justify-content:center; gap:15px; margin:20px 0;">
                        <button id="btnTimer" onclick="toggleTimer()" style="background:var(--primary); height:50px;">スタート</button>
                        <button onclick="endPeriod()" style="background:#f8f9fa; color:var(--primary); border:1px solid var(--border); height:50px; box-shadow:none;">試合終了</button>
                    </div>
                    <div class="score-board">
                        <div class="score-team-box"><div class="score-team-name" id="myTeamDisplay">HOME</div>
                            <div class="score-ctrl"><button class="score-btn" onclick="modifyOwnScore(-1)">-</button><div id="scoreOwn" class="score-val">0</div><button class="score-btn" onclick="modifyOwnScore(1)">+</button></div>
                        </div>
                        <div class="vs-text">VS</div>
                        <div class="score-team-box"><div class="score-team-name" id="oppDisplay">AWAY</div>
                            <div class="score-ctrl"><button class="score-btn" onclick="modifyOppScore(-1)">-</button><div id="scoreOpp" class="score-val">0</div><button class="score-btn" onclick="modifyOppScore(1)">+</button></div>
                        </div>
                    </div>
                </div>
                <div class="pitch" id="livePitchArea"></div>
                <div id="onPitchGrid" class="player-grid"></div>
                <div id="benchGrid" class="player-grid"></div>
                <textarea id="liveMemo" placeholder="試合のメモ（MVP等）..." oninput="syncToCloud()" style="height:100px; margin-top:20px;"></textarea>
                <div id="eventLog" style="font-size:12px; color:var(--text-sub); margin-top:15px; line-height:1.6;"></div>
            </div>
        </div>

        <div id="tabHistory" class="tab-content">
            <h2 style="font-size:18px; font-weight:900; margin-bottom:20px;">試合レポート</h2>
            <div id="historyList"></div>
        </div>

        <div id="tabDashboard" class="tab-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h2 style="font-size:18px; font-weight:900; margin:0;">ダッシュボード</h2>
                <button onclick="printDashboard()" style="width:auto; padding:8px 15px; font-size:12px; height:auto; background:#34495e;">🖨️ PDF</button>
            </div>
            
            <div id="dashFilters" style="background:#fff; padding:15px; border-radius:12px; margin-bottom:15px; border:1px solid var(--border); box-shadow:var(--shadow);">
                <div style="display:flex; gap:10px;">
                    <select id="dashFilterTeam" onchange="applyDashFilter()" style="flex:1;"><option value="all">全チーム</option></select>
                    <select id="dashFilterYear" onchange="applyDashFilter()" style="flex:1;"><option value="all">全期間</option></select>
                </div>
            </div>

            <div class="dash-grid" id="dashStats">
                <div class="dash-card"><div class="dash-label">試合数</div><div class="dash-val" id="dashTotal">0</div></div>
                <div class="dash-card"><div class="dash-label">勝率</div><div class="dash-val" id="dashWinRate">0%</div></div>
                <div class="dash-card"><div class="dash-label">勝敗</div><div class="dash-val" id="dashWDL" style="font-size:20px;">0勝0敗0分</div></div>
                <div class="dash-card"><div class="dash-label">クリーンシート</div><div class="dash-val" id="dashCS">0</div></div>
                <div class="dash-card"><div class="dash-label">総得点</div><div class="dash-val" id="dashGF" style="color:var(--accent);">0</div></div>
                <div class="dash-card"><div class="dash-label">総失点</div><div class="dash-val" id="dashGA" style="color:var(--secondary);">0</div></div>
            </div>
            <div class="card">
                <h3 style="font-size:14px; font-weight:900; color:var(--text-sub); margin:0 0 15px 0;">👑 チーム内 得点王 TOP3</h3>
                <ul class="dash-list" id="dashTopScorers"><li style="color:#bdc3c7; text-align:center;">データがありません</li></ul>
            </div>
        </div>

        <div id="tabSettings" class="tab-content">
            <h2 style="font-size:20px; font-weight:900; margin-bottom:20px;">Master Data</h2>
            
            <div class="card">
                <div style="display:flex; gap:15px; align-items:center;">
                    <div class="photo-upload-wrap" onclick="document.getElementById('tLogoIn').click()">
                        <img id="tLogoPreview">
                        <span class="upload-icon">📷</span>
                    </div>
                    <input type="file" id="tLogoIn" accept="image/*" style="display:none;" onchange="previewFile(this, 'tLogoPreview')">
                    <div style="flex:1;">
                        <input type="text" id="teamInName" placeholder="チーム名 (例: FC Pitch)" style="margin-bottom:8px;">
                        <input type="text" id="categoryInName" placeholder="グループ (任意)">
                    </div>
                </div>
                <button onclick="addMaster('teams_master')" style="margin-top:15px; background:var(--primary);">チームを追加</button>
            </div>

            <div class="card">
                <div style="display:flex; gap:15px; align-items:center; margin-bottom:15px;">
                    <div class="photo-upload-wrap" onclick="document.getElementById('pPhotoIn').click()">
                        <img id="pPhotoPreview">
                        <span class="upload-icon">📷</span>
                    </div>
                    <input type="file" id="pPhotoIn" accept="image/*" style="display:none;" onchange="previewFile(this, 'pPhotoPreview')">
                    <div style="flex:1; display:flex; gap:8px;">
                        <input type="number" id="pInNum" placeholder="No." style="width:70px;">
                        <input type="text" id="pInName" placeholder="選手名">
                    </div>
                </div>
                <select id="pInTeam" style="margin-bottom:15px;"><option value="">所属チームを選択</option></select>
                <button onclick="addMaster('players_master')">選手を新規登録</button>
            </div>
            
            <div id="masterAccordionArea"></div>
        </div>
    </div>

    <div class="bottom-nav" id="bottomNav" style="display:none;">
        <div class="nav-item active" id="navLive" onclick="showTab('tabLive', this)">ライブ</div>
        <div class="nav-item" id="navHistory" onclick="showTab('tabHistory', this)">履歴</div>
        <div class="nav-item" id="navDashboard" onclick="showTab('tabDashboard', this)">成績・PDF</div>
        <div class="nav-item" id="navSettings" onclick="showTab('tabSettings', this)">設定</div>
    </div>
</div>

<div id="editModal" class="modal-overlay" onclick="closeModals()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 id="editModalTitle" style="margin-top:0; font-weight:900; color:var(--primary);">編集</h3>
        <div id="editFields"></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button id="deleteBtn" style="flex:1; background:var(--bg); color:var(--secondary); border:1px solid var(--border); box-shadow:none;">🗑️ 削除</button>
            <button id="saveEditBtn" style="flex:2; background:var(--accent);">保存</button>
        </div>
        <div style="margin-top:10px; text-align:center;"><button onclick="closeModals()" style="background:transparent; color:var(--text-sub); box-shadow:none; padding:10px;">キャンセル</button></div>
    </div>
</div>

<div id="actionModal" class="modal-overlay" onclick="closeModals()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 id="modalTitle" style="text-align:center; color:var(--primary); margin-bottom:20px; font-weight:900;"></h3>
        <div id="modalList"></div>
        <button onclick="closeModals()" style="background:#f8f9fa; color:var(--text-main); border:1px solid var(--border); margin-top:15px; box-shadow:none;">閉じる</button>
    </div>
</div>

<div id="full-loading"><div class="spinner" style="width:40px;height:40px;margin-bottom:15px;border-width:4px;"></div><div id="full-loading-text">処理中...</div></div>

<script>
    const SUPABASE_URL = 'https://gdzdyykladyccrcvdtbh.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_TWz1alSKy36qDAGtmZ3DFg_7N7sdmBz';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let db = { teams: [], players: [] };

    let startY = 0, pulling = false;
    const appContainer = document.getElementById('appContainer'), ptrIndicator = document.getElementById('ptr-indicator'), ptrSpinner = document.getElementById('ptr-spinner'), ptrText = document.getElementById('ptr-text');
    
    window.addEventListener('touchstart', (e) => { 
        if (window.scrollY <= 0) { startY = e.touches[0].pageY; pulling = true; } 
    }, { passive: true });
    
    window.addEventListener('touchmove', (e) => { 
        if (!pulling) return; 
        const currentTab = localStorage.getItem('ps_active_tab') || 'tabLive';
        if (currentTab !== 'tabHistory' && currentTab !== 'tabDashboard') return;
        const diff = e.touches[0].pageY - startY; 
        if (diff > 0 && window.scrollY <= 0) { 
            if(e.cancelable) e.preventDefault();
            ptrIndicator.style.display = 'flex'; 
            const move = Math.pow(diff, 0.8); appContainer.style.transform = `translateY(${move}px)`; 
            ptrText.innerText = move > 50 ? "指を離して更新" : "スワイプして更新"; 
        } 
    }, { passive: false });
    
    window.addEventListener('touchend', () => { 
        if (!pulling) return; pulling = false; 
        const currentTab = localStorage.getItem('ps_active_tab') || 'tabLive';
        if (currentTab !== 'tabHistory' && currentTab !== 'tabDashboard') return;
        const match = appContainer.style.transform.match(/translateY\((.*)px\)/), move = match ? parseFloat(match[1]) : 0;

    // ▼ 画像プレビューと圧縮エンジン ▼
    function previewFile(input, imgId) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.getElementById(imgId);
                img.src = e.target.result; img.style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function compressImage(file, maxSize = 200) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = event => {
                const img = new Image(); img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width, height = img.height;
                    if (width > height) { if (width > maxSize) { height *= maxSize / width; width = maxSize; } } 
                    else { if (height > maxSize) { width *= maxSize / height; height = maxSize; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                    canvas.toBlob(blob => { resolve(new File([blob], file.name, { type: 'image/jpeg' })); }, 'image/jpeg', 0.8);
                };
            };
        });
    }

    async function uploadToStorage(file, folder) {
        const compressedFile = await compressImage(file);
        const fileName = `${folder}/${Date.now()}_${Math.random().toString(36).substring(7)}.jpg`;
        const { error } = await supabaseClient.storage.from('pitchside-public').upload(fileName, compressedFile);
        if (error) { alert("画像の保存に失敗しました。"); return null; }
        const { data } = supabaseClient.storage.from('pitchside-public').getPublicUrl(fileName);
        return data.publicUrl;
    }

    function getFiscalYear(dateString) { const d = new Date(dateString); return (d.getMonth() + 1 < 4) ? d.getFullYear() - 1 : d.getFullYear(); }

    async function fetchReports() {
        showLoading("データ同期中...");
        const { data } = await supabaseClient.from('match_reports').select('*').order('created_at', { ascending: false });
        hideLoading();
        if(data) { 
            globalReports = data; 
            document.getElementById('historyList').innerHTML = data.map(r => `
                <details class="report-item">
                    <summary><div style="flex:1;"><div style="font-size:10px; color:var(--text-sub);">${new Date(r.created_at).toLocaleDateString()}</div><div style="font-weight:800; font-size:14px;">${r.my_team} vs ${r.opponent}</div><div class="report-score">${r.my_score} - ${r.opp_score}</div></div></summary>
                    <div style="padding:20px; background:#f8f9fa; border-top:1px solid var(--border);">
                        <ul style="font-size:13px; color:var(--text-sub); padding-left:20px; margin-bottom:15px;">${r.events.map(e => `<li>[${e.time}] ${e.type === 'goal'?'⚽':e.type==='opp_goal'?'⚠️':'🟨'} ${e.player_name}</li>`).join('') || '<li>記録なし</li>'}</ul>
                        <textarea id="editMemo_${r.id}" style="height:80px; margin-bottom:15px;">${r.memo || ''}</textarea>
                        <div style="display:flex; gap:10px;"><button onclick="saveEditedReport('${r.id}', this)" style="flex:2; height:46px; font-size:14px;">メモ保存</button><button onclick="deleteReport('${r.id}')" style="flex:1; height:46px; font-size:14px; background:var(--secondary);">削除</button></div>
                    </div>
                </details>`).join(''); 
            
            updateDashboardFilters(data); applyDashFilter();
        }
    }

    function updateDashboardFilters(reports) {
        const teams = new Set(), years = new Set();
        reports.forEach(r => { teams.add(r.my_team); years.add(getFiscalYear(r.created_at)); });

        const teamSel = document.getElementById('dashFilterTeam'), currentTeam = teamSel.value;
        teamSel.innerHTML = '<option value="all">全チーム</option>' + Array.from(teams).map(t => `<option value="${t}">${t}</option>`).join('');
        if(Array.from(teams).includes(currentTeam)) teamSel.value = currentTeam;

        const yearSel = document.getElementById('dashFilterYear'), currentYear = yearSel.value;
        yearSel.innerHTML = '<option value="all">全期間</option>' + Array.from(years).sort((a,b)=>b-a).map(y => `<option value="${y}">${y}年度</option>`).join('');
        if(Array.from(years).map(String).includes(currentYear)) yearSel.value = currentYear;
    }

    function applyDashFilter() {
        const filterTeam = document.getElementById('dashFilterTeam').value, filterYear = document.getElementById('dashFilterYear').value;
        let filtered = globalReports;
        if(filterTeam !== 'all') filtered = filtered.filter(r => r.my_team === filterTeam);
        if(filterYear !== 'all') filtered = filtered.filter(r => getFiscalYear(r.created_at).toString() === filterYear);

        let total = filtered.length, wins = 0, draws = 0, losses = 0, gf = 0, ga = 0, cs = 0; const scorers = {};
        filtered.forEach(r => {
            gf += r.my_score; ga += r.opp_score;
            if(r.my_score > r.opp_score) wins++; else if(r.my_score < r.opp_score) losses++; else draws++;
            if(r.opp_score === 0) cs++;
            if(r.events) r.events.forEach(e => { if(e.type === 'goal' && e.player_id) { scorers[e.player_id] = (scorers[e.player_id] || { name: e.player_name, goals: 0 }); scorers[e.player_id].goals++; } });
        });

        document.getElementById('dashTotal').innerText = total; document.getElementById('dashWinRate').innerText = `${total > 0 ? Math.round((wins / total) * 100) : 0}%`;
        document.getElementById('dashWDL').innerText = `${wins}勝 ${losses}敗 ${draws}分`; document.getElementById('dashCS').innerText = cs; document.getElementById('dashGF').innerText = gf; document.getElementById('dashGA').innerText = ga;
        
        const sortedScorers = Object.values(scorers).sort((a, b) => b.goals - a.goals).slice(0, 3), medals = ['🥇', '🥈', '🥉'];
        document.getElementById('dashTopScorers').innerHTML = sortedScorers.length > 0 ? sortedScorers.map((s, i) => {
            // アバター画像があればダッシュボードのランキングにも表示
            const p = db.players.find(x => x.id === s.name); // IDで検索...は今回実装が複雑になるのでシンプルに名前で表示
            return `<li><span>${medals[i]} ${s.name}</span><span style="color:var(--primary);">${s.goals} ゴール</span></li>`;
        }).join('') : '<li style="color:#bdc3c7; text-align:center;">データがありません</li>';
    }

    function addEventLog(txt) { const entry = document.createElement('div'); entry.textContent = `[${formatTime(live.timerLeft)}] ${txt}`; document.getElementById('eventLog').prepend(entry); }
    function formatTime(s) { const m = Math.floor(Math.abs(s)/60), sc = Math.abs(s)%60; return `${m.toString().padStart(2,'0')}:${sc.toString().padStart(2,'0')}`; }

    function updateTimerLogic() { if (!live.timerInterval) return; const deltaSeconds = Math.floor((Date.now() - live.lastTickTime) / 1000); if (deltaSeconds > 0) { live.lastTickTime += deltaSeconds * 1000; live.timerLeft -= deltaSeconds; if(live.timerLeft <= 0) live.timerLeft = 0; updateUI(); } }
    function toggleTimer() { const btn = document.getElementById('btnTimer'); if(live.timerInterval) { clearInterval(live.timerInterval); live.timerInterval = null; btn.innerText = "再開"; } else { live.lastTickTime = Date.now(); live.timerInterval = setInterval(updateTimerLogic, 1000); btn.innerText = "停止"; } }

    function showTab(tabId, el) { 
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); document.getElementById(tabId).classList.add('active'); 
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active'); 
        localStorage.setItem('ps_active_tab', tabId); 
        if(tabId === 'tabHistory' || tabId === 'tabDashboard') fetchReports();
    }
    
    function closeModals() { document.getElementById('actionModal').style.display = 'none'; document.getElementById('editModal').style.display = 'none'; }
    function showActionModal(title, html) { document.getElementById('modalTitle').innerText = title; document.getElementById('modalList').innerHTML = html; document.getElementById('actionModal').style.display = 'flex'; }
</script>
</body>
</html>
