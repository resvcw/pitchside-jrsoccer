<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PitchSide Pro v9.5.0 - クラウド同期版</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #1a2a3a; --accent: #2ecc71; --secondary: #e74c3c;
            --bg: #f5f7fa; --card-bg: #ffffff; --text-main: #2c3e50;
            --text-sub: #7f8c8d; --border: #e0e6ed;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --gradient: linear-gradient(135deg, #1a2a3a 0%, #2c3e50 100%);
        }
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); margin: 0; padding-bottom: 100px; color: var(--text-main); user-select: none; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        
        .container { max-width: 500px; margin: 0 auto; min-height: 100vh; padding: 0 15px; }
        .tab-content { display: none; padding: 15px 0; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card-bg); border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); position: relative; }
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 12px; font-weight: 800; color: var(--text-sub); margin-bottom: 6px; }
        
        input, select, textarea { width: 100%; padding: 12px 15px; border: 1px solid var(--border); border-radius: 10px; font-size: 15px; font-weight: 600; outline: none; background: #fff; color: var(--text-main); }
        button { background: var(--gradient); color: #fff; border: none; padding: 15px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; }
        button:disabled { background: #bdc3c7; }

        /* Score & Pitch */
        .live-header { background: #fff; padding: 20px; border-radius: 20px; margin-bottom: 20px; text-align: center; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .timer-display { font-size: 44px; font-weight: 800; color: var(--primary); }
        .score-board { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; background: #f8f9fa; padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        .score-val { font-size: 30px; font-weight: 800; min-width: 36px; }
        .pitch { width: 100%; aspect-ratio: 3/4; background: #27ae60; position: relative; border-radius: 16px; overflow: hidden; margin-top: 15px; border: 4px solid #2ecc71; }
        
        /* Player Icons & Chips */
        .player-icon { position: absolute; width: 56px; text-align: center; transform: translate(-50%, -50%); z-index: 10; }
        .icon-jersey { width: 40px; height: 40px; background: #fff; border: 2px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; box-shadow: 0 4px 8px rgba(0,0,0,0.15); overflow: hidden; }
        .player-photo { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        .icon-name { font-size: 9px; font-weight: 800; color: #fff; background: rgba(26, 42, 58, 0.9); padding: 2px 6px; border-radius: 4px; margin-top: 4px; white-space: nowrap; }
        .player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; margin-top: 15px; }
        .player-chip { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 10px 5px; text-align: center; font-size: 11px; font-weight: 700; position: relative; }

        /* Photo Upload UI (Fixed) */
        .player-reg-grid { display: grid; grid-template-columns: 80px 1fr; gap: 15px; }
        .photo-input-wrap { width: 64px; height: 64px; background: #f8f9fa; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; border: 2px dashed #ddd; }
        .photo-input-wrap input[type="file"] { position: absolute; width: 100%; height: 100%; opacity: 0; z-index: 5; cursor: pointer; }
        .photo-preview { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: none; position: absolute; z-index: 2; }
        .photo-clear-btn { position: absolute; top: -4px; right: -4px; background: var(--secondary); color: #fff; width: 20px; height: 20px; border-radius: 50%; font-size: 12px; z-index: 10; display: none; align-items: center; justify-content: center; border: 2px solid #fff; }

        /* Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; display: flex; padding: 12px 10px 25px; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { flex: 1; text-align: center; font-size: 11px; color: var(--text-sub); font-weight: 800; }
        .nav-item.active { color: var(--primary); }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #fff; width: 100%; max-width: 400px; border-radius: 20px; padding: 25px; max-height: 85vh; overflow-y: auto; }
        .action-btn { background: #f8f9fa; border: 1px solid var(--border); padding: 14px; border-radius: 10px; font-weight: 700; margin-bottom: 8px; text-align: center; }
        .category-header { font-size: 11px; font-weight: 800; color: var(--primary); background: #f0f4f8; padding: 6px 12px; border-radius: 6px; margin: 15px 0 8px 0; border-left: 4px solid var(--primary); }
        .chip-del { background: #fff; border: 1px solid var(--border); padding: 10px 15px; border-radius: 10px; font-size: 13px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
        .del-btn { color: var(--secondary); font-weight: 800; padding: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginSection" style="padding:100px 30px; text-align:center;">
        <div style="width:70px; height:70px; background:var(--gradient); border-radius:18px; margin:0 auto 20px; display:flex; align-items:center; justify-content:center;">
            <div style="font-size:32px; font-weight:800; color:#fff;">P</div>
        </div>
        <h1 style="font-size:20px; font-weight:800; color:var(--primary); margin-bottom:40px;">PitchSide Pro <span style="font-size:12px; opacity:0.6;">Cloud v9.5</span></h1>
        <input type="password" id="passcode" placeholder="パスコードを入力" style="text-align:center; letter-spacing:4px; padding:18px; margin-bottom:15px;">
        <button id="loginBtn" onclick="checkPass()">ログイン</button>
    </div>

    <div id="mainUI" style="display:none;">
        <div id="tabLive" class="tab-content active">
            <div id="setupScreen">
                <div class="card">
                    <h2 style="font-size:18px; font-weight:800; margin-bottom:20px;">試合設定</h2>
                    <div class="form-group">
                        <label class="form-label">自チーム・カテゴリ</label>
                        <div style="display:flex; gap:10px;">
                            <select id="setupMyTeam" onchange="updateSetupCategoryFilter()"><option value="">チーム選択</option></select>
                            <select id="setupCategory" onchange="updateUI()"><option value="">カテゴリ選択</option></select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">対戦相手</label>
                        <div id="quickOppList" style="margin-bottom:8px;"></div>
                        <input type="text" id="oppName" placeholder="相手チーム名">
                    </div>
                    <div class="form-group">
                        <label class="form-label">会場・大会</label>
                        <input type="text" id="venueName" placeholder="会場名" style="margin-bottom:8px;">
                        <select id="tournamentSelect"><option value="">大会名を選択</option></select>
                    </div>
                    <div style="display:flex; gap:10px;">
                        <select id="matchType" style="flex:1;"><option value="公式戦">公式戦</option><option value="トレーニングマッチ">練習試合</option></select>
                        <select id="formationSelect" style="flex:1;"><option value="3-3-1">3-3-1</option><option value="2-4-1">2-4-1</option></select>
                    </div>
                    <button onclick="startMatch()" style="margin-top:15px;">キックオフ</button>
                </div>
            </div>

            <div id="liveScreen" style="display:none;">
                <div class="live-header">
                    <div class="timer-display" id="timerText">15:00</div>
                    <div id="atValueDisplay" style="font-size:14px; color:var(--text-sub); margin:5px 0;">+0:00 AT</div>
                    <div style="display:flex; justify-content:center; gap:10px; margin:15px 0;">
                        <button id="btnTimer" onclick="toggleTimer()" style="width:100px; padding:10px;">開始</button>
                        <button onclick="endPeriod()" style="width:100px; padding:10px; background:#eee; color:#333;">終了</button>
                    </div>
                    <div class="score-board">
                        <div style="flex:1;"><div id="myTeamDisplay" style="font-size:11px; margin-bottom:5px;">HOME</div><div style="display:flex; align-items:center; justify-content:center; gap:10px;"><button class="score-btn" onclick="modifyOwnScore(1)" style="width:40px; padding:5px;">+</button><div id="scoreOwn" class="score-val">0</div></div></div>
                        <div style="font-size:12px; color:#ccc;">VS</div>
                        <div style="flex:1;"><div id="oppDisplay" style="font-size:11px; margin-bottom:5px;">AWAY</div><div style="display:flex; align-items:center; justify-content:center; gap:10px;"><div id="scoreOpp" class="score-val">0</div><button class="score-btn" onclick="modifyOppScore(1)" style="width:40px; padding:5px;">+</button></div></div>
                    </div>
                </div>
                <div class="pitch" id="livePitchArea"></div>
                <div id="onPitchGrid" class="player-grid"></div>
                <div id="benchGrid" class="player-grid"></div>
            </div>
        </div>

        <div id="tabSettings" class="tab-content">
            <div class="card">
                <h2 style="font-size:18px; font-weight:800; margin-bottom:20px;">マスター登録</h2>
                
                <div class="form-group">
                    <label class="form-label">チーム登録</label>
                    <div style="display:flex; gap:8px;"><input type="text" id="teamInName" placeholder="チーム"><input type="text" id="categoryInName" placeholder="カテゴリ"><button onclick="addTeamMaster()" style="width:60px; padding:0;">追加</button></div>
                </div>
                <div id="teamMasterList"></div>

                <div class="form-group" style="margin-top:25px;">
                    <label class="form-label">選手登録</label>
                    <div class="player-reg-grid">
                        <div class="photo-input-wrap">
                            <span style="font-size:20px;">📷</span>
                            <img id="pInPhotoPreview" class="photo-preview">
                            <div id="photoClearBtn" class="photo-clear-btn" onclick="clearPhotoSelection(event)">×</div>
                            <input type="file" id="pInPhoto" accept="image/*" onchange="previewPhoto(this)">
                        </div>
                        <div>
                            <div style="display:flex; gap:5px; margin-bottom:5px;"><input type="number" id="pInNum" placeholder="No." style="width:60px;"><input type="text" id="pInName" placeholder="選手名"></div>
                            <div style="display:flex; gap:5px;"><select id="pInTeam" onchange="updateCategorySelect('pInTeam', 'pInCategory')"><option value="">チーム</option></select><select id="pInCategory"><option value="">カテゴリ</option></select></div>
                            <button id="addPlayerBtn" onclick="addPlayerMaster()" style="height:40px; margin-top:8px; font-size:13px;">登録する</button>
                        </div>
                    </div>
                </div>
                <div id="pMasterListGrouped"></div>
            </div>
        </div>
    </div>

    <div class="bottom-nav" id="bottomNav" style="display:none;">
        <div class="nav-item active" onclick="showTab('tabLive', this)">ライブ</div>
        <div class="nav-item" onclick="showTab('tabSettings', this)">設定</div>
    </div>
</div>

<div id="actionModal" class="modal-overlay" onclick="closeModals()"><div class="modal-content" onclick="event.stopPropagation()"><h3 id="modalTitle" style="text-align:center; margin-bottom:15px;"></h3><div id="modalList"></div></div></div>

<script>
    const SUPABASE_URL = 'https://gdzdyykladyccrcvdtbh.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_TWz1alSKy36qDAGtmZ3DFg_7N7sdmBz';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let db = { teams: [], players: [], opps: [], tournaments: [] };
    let live = { currentId: null, timerInterval: null, timerLeft: 900, atSeconds: 0, isAT: false, score: { own: 0, opp: 0 }, formation: "3-3-1", pitchPositions: {}, selectedTeam: "", selectedCategory: "" };

    const formations = { "3-3-1": [ {id:'gk',t:'90%',l:'50%',label:'GK'}, {id:'df1',t:'75%',l:'20%',label:'DFL'}, {id:'df2',t:'75%',l:'50%',label:'DFC'}, {id:'df3',t:'75%',l:'80%',label:'DFR'}, {id:'mf1',t:'45%',l:'20%',label:'MFL'}, {id:'mf2',t:'45%',l:'50%',label:'MFC'}, {id:'mf3',t:'45%',l:'80%',label:'MFR'}, {id:'fw1',t:'15%',l:'50%',label:'FW'} ] };

    function checkPass() { if(document.getElementById('passcode').value === '2026') { localStorage.setItem('ps_logged_in', 'true'); location.reload(); } else { alert("パスコードが違います"); } }
    
    document.addEventListener('DOMContentLoaded', async () => {
        if (localStorage.getItem('ps_logged_in') === 'true') {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('mainUI').style.display = 'block';
            document.getElementById('bottomNav').style.display = 'flex';
            await refreshAllData();
        }
    });

    async function refreshAllData() {
        const { data: t } = await supabaseClient.from('teams_master').select('*').order('team');
        const { data: p } = await supabaseClient.from('players_master').select('*').order('num');
        db.teams = t || []; db.players = p || [];
        updateSetupLists(); refreshSettingsUI();
    }

    async function addTeamMaster() {
        const team = document.getElementById('teamInName').value, cat = document.getElementById('categoryInName').value;
        if(!team || !cat) return;
        await supabaseClient.from('teams_master').insert([{ team, category: cat }]);
        document.getElementById('categoryInName').value = '';
        await refreshAllData();
    }

    async function addPlayerMaster() {
        const name = document.getElementById('pInName').value, num = document.getElementById('pInNum').value;
        const team = document.getElementById('pInTeam').value, cat = document.getElementById('pInCategory').value;
        if(!name) return;
        document.getElementById('addPlayerBtn').disabled = true;
        await supabaseClient.from('players_master').insert([{ name, num, team, category: cat, photo: currentPhotoData }]);
        document.getElementById('pInName').value = ''; document.getElementById('pInNum').value = ''; clearPhotoSelection();
        await refreshAllData();
        document.getElementById('addPlayerBtn').disabled = false;
    }

    async function deleteItem(table, id) {
        if(!confirm("削除しますか？")) return;
        await supabaseClient.from(table).delete().eq('id', id);
        await refreshAllData();
    }

    // --- 以下、既存のロジックをクラウド対応に微調整 ---
    function updateSetupLists() {
        const setupT = document.getElementById('setupMyTeam'), pT = document.getElementById('pInTeam');
        const uniqueT = [...new Set(db.teams.map(t => t.team))];
        const options = '<option value="">選択</option>' + uniqueT.map(t => `<option value="${t}">${t}</option>`).join('');
        setupT.innerHTML = options; pT.innerHTML = options;
    }

    function updateCategorySelect(teamId, catId) {
        const team = document.getElementById(teamId).value, catS = document.getElementById(catId);
        catS.innerHTML = '<option value="">選択</option>' + db.teams.filter(t => t.team === team).map(t => `<option value="${t.category}">${t.category}</option>`).join('');
    }

    function updateSetupCategoryFilter() { updateCategorySelect('setupMyTeam', 'setupCategory'); }

    function refreshSettingsUI() {
        document.getElementById('teamMasterList').innerHTML = db.teams.map(t => `<div class="chip-del">${t.team} (${t.category}) <span class="del-btn" onclick="deleteItem('teams_master', '${t.id}')">×</span></div>`).join('');
        const grouped = {}; db.players.forEach(p => { const k = `${p.team || '未設定'}-${p.category || '未設定'}`; if(!grouped[k]) grouped[k]=[]; grouped[k].push(p); });
        let html = '';
        for(let k in grouped) {
            html += `<div class="category-header">${k}</div>`;
            html += grouped[k].map(p => `<div class="chip-del"><div>${p.photo ? `<img src="${p.photo}" style="width:20px;height:20px;border-radius:50%;vertical-align:middle;margin-right:5px;">` : ''}${p.num?p.num+'. ':''}${p.name}</div><span class="del-btn" onclick="deleteItem('players_master', '${p.id}')">×</span></div>`).join('');
        }
        document.getElementById('pMasterListGrouped').innerHTML = html;
    }

    async function startMatch() {
        const myT = document.getElementById('setupMyTeam').value, myC = document.getElementById('setupCategory').value, opp = document.getElementById('oppName').value;
        if(!myT || !opp) return alert("チーム名と相手を入力してください");
        const { data } = await supabaseClient.from('match_reports').insert([{ my_team: `${myT}(${myC})`, opponent: opp, venue: document.getElementById('venueName').value, score: "0 - 0" }]).select();
        live.currentId = data[0].id; live.selectedTeam = myT; live.selectedCategory = myC;
        document.getElementById('setupScreen').style.display = 'none'; document.getElementById('liveScreen').style.display = 'block';
        updateUI();
    }

    function updateUI() {
        document.getElementById('timerText').innerText = formatTime(live.timerLeft);
        document.getElementById('scoreOwn').innerText = live.score.own; document.getElementById('scoreOpp').innerText = live.score.opp;
        const pitch = document.getElementById('livePitchArea'); pitch.innerHTML = '';
        formations[live.formation].forEach(pos => {
            const pId = live.pitchPositions[pos.id], p = db.players.find(x => x.id === pId);
            const slot = document.createElement('div'); slot.className = 'player-icon'; slot.style.top = pos.t; slot.style.left = pos.l;
            if(!p) slot.innerHTML = `<div class="icon-jersey" style="opacity:0.3;" onclick="choosePlayer('${pos.id}')">+</div>`;
            else slot.innerHTML = `<div class="icon-jersey" onclick="choosePlayer('${pos.id}')">${p.photo ? `<img src="${p.photo}" class="player-photo">` : ''}<span style="position:relative;z-index:2;">${p.num||''}</span></div><div class="icon-name">${p.name}</div>`;
            pitch.appendChild(slot);
        });
        const bench = db.players.filter(p => p.team === live.selectedTeam && p.category === live.selectedCategory && !Object.values(live.pitchPositions).includes(p.id));
        document.getElementById('benchGrid').innerHTML = bench.map(p => `<div class="player-chip" onclick="showPlayerActions('${p.id}')">${p.num?p.num+'.':''}${p.name}</div>`).join('');
    }

    function choosePlayer(posId) {
        const bench = db.players.filter(p => p.team === live.selectedTeam && p.category === live.selectedCategory && !Object.values(live.pitchPositions).includes(p.id));
        showActionModal("選手交代", bench.map(p => `<div class="action-btn" onclick="assignPlayer('${posId}','${p.id}')">${p.name}</div>`).join('') || "ベンチに選手がいません");
    }
    function assignPlayer(posId, pId) { live.pitchPositions[posId] = pId; closeModals(); updateUI(); syncMatch(); }
    function modifyOwnScore(v) { live.score.own += v; updateUI(); syncMatch(); }
    function modifyOppScore(v) { live.score.opp += v; updateUI(); syncMatch(); }
    async function syncMatch() { if(!live.currentId) return; await supabaseClient.from('match_reports').update({ score: `${live.score.own} - ${live.score.opp}` }).eq('id', live.currentId); }

    function formatTime(s) { const m = Math.floor(s/60), sc = s%60; return `${m.toString().padStart(2,'0')}:${sc.toString().padStart(2,'0')}`; }
    function toggleTimer() {
        const btn = document.getElementById('btnTimer');
        if(live.timerInterval) { clearInterval(live.timerInterval); live.timerInterval = null; btn.innerText = "再開"; }
        else { live.timerInterval = setInterval(() => { if(live.timerLeft > 0) live.timerLeft--; updateUI(); }, 1000); btn.innerText = "停止"; }
    }
    function showTab(id, el) { document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); document.getElementById(id).classList.add('active'); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active'); }
    function showActionModal(title, html) { document.getElementById('modalTitle').innerText = title; document.getElementById('modalList').innerHTML = html; document.getElementById('actionModal').style.display = 'flex'; }
    function closeModals() { document.getElementById('actionModal').style.display = 'none'; }

    let currentPhotoData = null;
    function previewPhoto(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX = 120; let w = img.width, h = img.height;
                    if (w > h) { if (w > MAX) { h *= MAX / w; w = MAX; } } else { if (h > MAX) { w *= MAX / h; h = MAX; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    currentPhotoData = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('pInPhotoPreview').src = currentPhotoData;
                    document.getElementById('pInPhotoPreview').style.display = 'block';
                    document.getElementById('photoClearBtn').style.display = 'flex';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }
    function clearPhotoSelection(e) { if(e) e.stopPropagation(); currentPhotoData = null; document.getElementById('pInPhoto').value = ""; document.getElementById('pInPhotoPreview').style.display = 'none'; document.getElementById('photoClearBtn').style.display = 'none'; }
    function endPeriod() { if(confirm("試合を終了しますか？")) location.reload(); }
</script>
</body>
</html>
